# Default model family: Ministral-based Nemotron 3 Embed.
# Stage 3: Evaluation Configuration
#
# Evaluates embedding models on retrieval metrics using BEIR framework.
# Compares base model vs fine-tuned model on nDCG, Recall, and Precision.
# Optionally evaluates a NIM API endpoint for accuracy verification.
#
# Usage:
#   nemotron embed eval -c default
#   nemotron embed eval -c default finetuned_model_path=/path/to/model
#
# Evaluate NIM endpoint:
#   nemotron embed eval -c default eval_nim=true nim_url=http://localhost:8001
# Evaluate vLLM endpoint:
#   nemotron embed eval -c default eval_nim=true embedding_api_backend=vllm
#
# Remote execution (Slurm):
#   nemotron embed eval -c default --run my-cluster
#   nemotron embed eval -c default --batch my-cluster

# Execution environment configuration
run:
  env:
    # Container image for remote execution (Docker/Slurm)
    container: nvcr.io/nvidia/pytorch:25.12-py3

# Root for all artifacts produced by this model profile.
artifact_root: ./output/embed/nemotron-3-1b

# Base embedding model for comparison
base_model: nvidia/Nemotron-3-Embed-1B-BF16

# Path to fine-tuned model checkpoint
finetuned_model_path: ${artifact_root}/stage2_finetune/checkpoints/LATEST/model/consolidated

# Path to BEIR-formatted evaluation data (from stage1_data_prep)
eval_data_path: ${artifact_root}/stage1_data_prep/eval_beir

# Output directory for evaluation results
output_dir: ${artifact_root}/stage3_eval

# K values for Recall@k and Precision@k metrics
k_values:
  - 1
  - 5
  - 10
  - 100

# Encoding settings
batch_size: 4
max_length: 512
corpus_chunk_size: 50000

# Model settings
pooling: mean
normalize: true
query_prefix: "query: "
passage_prefix: "passage: "

# Evaluation mode
eval_base: true
eval_finetuned: true

# Served embedding API evaluation settings
eval_nim: false  # Set to true to evaluate the selected API backend
nim_url: http://localhost:8000  # API base URL
nim_model: ${oc.env:NEMOTRON3_EMBED_NIM_MODEL,nvidia/nemotron-3-embed-1b}  # Model name for API requests
nim_batch_size: 32  # Batch size for API requests
nim_timeout: 60  # Request timeout in seconds
embedding_api_backend: nim  # Set to vllm to use vLLM's /v2/embed endpoint
nim_invalid_embedding_retries: 32  # Retry null/non-finite vectors
nim_embedding_dimension: 2048  # Reject responses from an incompatible endpoint/model
