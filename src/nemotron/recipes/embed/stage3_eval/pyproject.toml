[project]
name = "recipe-runner-eval"
version = "0.0.0"
requires-python = ">=3.12"
dependencies = [
    "beir>=2.0.0",
    "sentence-transformers>=3.0.0",
    "transformers>=5,<6",
    # Local GPU torch wheel, sourced from PyTorch cu129 index on Linux below
    "torch>=2.10.0",
    "requests>=2.32.0",
    # Needed by Nemotron library (added via --with flag)
    "omegaconf>=2.3.0",
    "pydantic-settings>=2.0.0",
]

# Note: exclude-dependencies injected dynamically by run_uv.py for Docker/Slurm

# Pin Linux torch installs to cu129. CUDA 13 drivers can run cu12.x wheels via
# NVIDIA driver backward compatibility, while CUDA 12.9 hosts cannot run cu130.
[tool.uv.sources]
torch = [
    { index = "pytorch-cu129", marker = "sys_platform == 'linux'" },
]

[[tool.uv.index]]
name = "pytorch-cu129"
url = "https://download.pytorch.org/whl/cu129"
explicit = true

[tool.nemotron]
entry-point = "eval.py"
container-exclude-dependencies = [
    "torch",
    "torchao",
    "torchvision",
    "flash-attn",
    "triton",
    "pyarrow",
    "scipy",
    "opencv-python-headless",
]
