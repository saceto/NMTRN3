[project]
name = "recipe-runner"
version = "0.0.0"
requires-python = ">=3.12"
dependencies = [
  "nemo-automodel @ git+https://github.com/NVIDIA-NeMo/Automodel.git@3a3f6858",
  # Needed by Nemotron library (added via --with flag)
  "omegaconf>=2.3.0",
  "pydantic-settings>=2.0.0",
  # Pin transformers <5.2 — nemo-automodel's check_model_inputs decorator
  # is a ContextDecorator in 5.2.0 which breaks forward()
  "transformers>=5.3.0,<5.4.0",
]

# Note: exclude-dependencies are injected dynamically by run_uv.py for Docker/Slurm
# This base config works for local mode where all packages need to be installed

[tool.nemotron]
entry-point = "train.py"
container-exclude-dependencies = [
    "torch",
    "torchao",
    "torchvision",
    "flash-attn",
    "triton",
    "pyarrow",
    "scipy",
    "opencv-python-headless",
]
