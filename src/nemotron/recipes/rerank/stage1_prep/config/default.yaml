# Stage 1: Data Preparation Configuration (Rerank)
#
# Prepares training data from SDG output:
# 1. Convert to BEIR format (train/val/test split)
# 2. Mine hard negatives using base embedding model
# 3. Unroll multi-hop positives
#
# Uses the same prep pipeline as the embed recipe but reads/writes
# to the rerank output directory.
#
# Usage:
#   nemotron rerank prep -c default
#   nemotron rerank prep -c default sdg_input_path=/path/to/sdg

# Execution environment configuration
run:
  env:
    container: nvcr.io/nvidia/pytorch:25.12-py3

# Corpus identifier
corpus_id: nv_pp_random

# Path to SDG output directory (from rerank sdg stage)
sdg_input_path: ${oc.env:NEMO_RUN_DIR,.}/output/rerank/stage0_sdg

# Output directory for prepared training data
output_dir: ${oc.env:NEMO_RUN_DIR,.}/output/rerank/stage1_prep
artifact_recipe: rerank

# Base embedding model for hard negative mining
base_model: nvidia/llama-nemotron-embed-1b-v2

# Quality filtering threshold (0-10 scale)
quality_threshold: 7.0

# Train/val/test split ratios
train_ratio: 0.8
val_ratio: 0
test_ratio: 0.2

# Hard negative mining settings
attn_implementation: sdpa
hard_negatives_to_mine: 5
hard_neg_margin: 0.95
mining_batch_size: 128

# Tokenization settings
query_max_length: 512
passage_max_length: 512
query_prefix: "query:"
passage_prefix: "passage:"
