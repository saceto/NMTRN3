# Stage 2: Export Configuration
#
# Exports fine-tuned reranking models to ONNX and optionally TensorRT
# for optimized inference deployment.
#
# Usage:
#   nemotron rerank export -c default
#   nemotron rerank export -c default export_to_trt=false
#   nemotron rerank export -c default model_path=/path/to/model
#
# Remote execution (Slurm):
#   nemotron rerank export -c default --run my-cluster

# Execution environment configuration
run:
  env:
    container: nvcr.io/nvidia/nemo:25.07

# Path to fine-tuned HuggingFace model checkpoint
model_path: ./output/rerank/stage0_finetune/checkpoints/LATEST/model/consolidated

# Model settings
attn_implementation: eager  # Use eager for ONNX export compatibility

# Quantization settings (optional)
quant_cfg: null  # Options: null, "fp8", "int8_sq"
calibration_batch_size: 64

# ONNX export settings
onnx_export_path: ./output/rerank/stage2_export/onnx
opset: 17
export_dtype: fp32

# TensorRT export settings
export_to_trt: false
trt_model_path: ./output/rerank/stage2_export/tensorrt

# TensorRT precision overrides for numerical stability
override_layernorm_precision_to_fp32: true
override_layers_to_fp32:
  - "/model/norm/"
profiling_verbosity: layer_names_only

# TensorRT optimization profiles (batch size)
trt_min_batch: 1
trt_opt_batch: 16
trt_max_batch: 64

# TensorRT optimization profiles (sequence length)
trt_min_seq_len: 3
trt_opt_seq_len: 256
trt_max_seq_len: 512

# Base output directory
output_dir: ./output/rerank/stage2_export
