# Stage 5: Deploy Configuration
#
# Launches NVIDIA NeMo Retriever Reranking NIM. Custom fine-tuned models
# require a NIM model_manifest.yaml; raw ONNX/TensorRT directories from
# Stage 4 are not passed to NIM directly.
#
# Usage:
#   nemotron rerank deploy -c default
#   nemotron rerank deploy -c default detach=true
#   nemotron rerank deploy -c default nim_manifest_path=/path/to/model_manifest.yaml
#
# Test the deployed service:
#   curl -X POST http://localhost:8000/v1/ranking \
#     -H 'Content-Type: application/json' \
#     -d '{"model": "nvidia/llama-nemotron-rerank-1b-v2", "query": {"text": "what is AI?"}, "passages": [{"text": "AI is artificial intelligence"}]}'

# NIM container image
nim_image: nvcr.io/nim/nvidia/llama-nemotron-rerank-1b-v2:1.11.0

# Container name (for management)
container_name: nemotron-rerank-nim

# Replace an existing recipe-owned container with the same name
replace_existing: true

# Optional custom NIM model directory or manifest. If model_dir is set, it must
# contain model_manifest.yaml unless nim_manifest_path is provided.
model_dir: null
nim_manifest_path: null
nim_model_profile: null
nim_served_model_name: null

# Container internal paths
container_model_path: /opt/nim/custom_model
container_cache_path: /opt/nim/.cache

# Network settings
bind_address: 127.0.0.1
host_port: 8000
container_port: 8000

# GPU allocation
gpus: all

# Shared memory size
shm_size: 16gb

# Runtime settings
detach: false
remove_on_exit: true

# Health check settings
health_check_timeout: 120
health_check_interval: 5

# Environment variable for NGC API key
ngc_api_key_env: NGC_API_KEY
