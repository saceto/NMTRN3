run:
  data: super3-sft-data:latest
  model: super3-pretrain-model:latest
  env:
    container: nvcr.io/nvidia/nemo:26.02.nemotron_3_super

recipe:
  _target_: megatron.bridge.recipes.nemotronh.nemotron_3_super.nemotron_3_super_sft_config
  packed_sequence: true
  peft: null  # Disable LoRA, do full SFT

# Dataset config for packed Parquet shards from data_prep
# train.py builds FinetuningDatasetConfig directly (not HFDatasetConfig) to skip HF download
# Uses super3_packed_sft_dir for seamless config - auto-resolves to splits/train/ and splits/valid/
dataset:
  super3_packed_sft_dir: ${art:data,path}
  seq_length: ${art:data,pack_size}
  packed_sequence_specs:
    packed_sequence_size: ${art:data,pack_size}

train:
  train_iters: 1700
  global_batch_size: 4

# Model parallelism overrides only — architecture params come from the recipe
model:
  seq_length: ${art:data,pack_size}

scheduler:
  lr_warmup_iters: 4

logger:
  log_interval: 10
  wandb_project: ${run.wandb.project}
  wandb_entity: ${run.wandb.entity}
  wandb_exp_name: super3-sft

checkpoint:
  save: /nemo_run/super3-sft-model
  save_interval: 20
  pretrained_checkpoint: ${art:model,path}
  finetune: true

# Post-training HuggingFace checkpoint conversion
# When enabled, converts the final Megatron checkpoint to HF format and
# publishes it as a separate W&B artifact with -hf suffix.
convert_to_hf:
  enabled: true
  hf_model_id: "nvidia/NVIDIA-Nemotron-3-Super-120B-A12B-Base-BF16"
