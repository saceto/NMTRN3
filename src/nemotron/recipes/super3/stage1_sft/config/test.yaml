run:
  train_script: src/nemotron/recipes/super3/stage1_sft/test_train.py
  data: super3-sft-data:latest
  model: super3-pretrain-model-tiny:latest
  env:
    container: nvcr.io/nvidia/nemo:26.02.nemotron_3_super
    nodes: 1
    gpus_per_node: 1
    ntasks_per_node: 1

# The tiny Super3 model provider and recipe are defined in test_train.py.
# run.train_script above tells the CLI to use it instead of train.py.

dataset:
  super3_packed_sft_dir: ${art:data,path}
  seq_length: ${art:data,pack_size}
  packed_sequence_specs:
    packed_sequence_size: ${art:data,pack_size}

train:
  train_iters: 50
  global_batch_size: 4

scheduler:
  lr_warmup_iters: 4

logger:
  log_interval: 10
  wandb_project: ${run.wandb.project}
  wandb_entity: ${run.wandb.entity}

checkpoint:
  save: /nemo_run/super3-sft-model-tiny
  save_interval: 50
  pretrained_checkpoint: ${art:model,path}
  finetune: true

# Disabled for tiny/CI runs
convert_to_hf:
  enabled: false
  hf_model_id: "nvidia/NVIDIA-Nemotron-3-Super-120B-A12B-Base-BF16"
