run:
  env:
    container: anyscale/ray:2.49.2-py312

# Tiny config for RL data preparation (fast iteration/testing)
#
# Standalone usage:
#   python src/nemotron/recipes/super3/stage2_rl/data_prep.py --config tiny
#
# Nemotron CLI subcommands:
#   nemotron super3 data prep rl rlvr --config tiny

# Path to data blend JSON file
blend_path: ${oc.env:PWD}/src/nemotron/recipes/super3/stage2_rl/config/data_prep/data_blend_raw.json

# Output directory for resolved JSONL data
output_dir: ${oc.env:PWD}/../output/super3/stage2_rl_tiny

# Limit rows per dataset for quick tests - small sample for tiny
sample: 1000

# Force new run, ignoring cache
force: false
