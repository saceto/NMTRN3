run:
  env:
    container: anyscale/ray:2.55.1-py312

# Tiny Ultra3 SFT config for fast CLI/runspec validation.

# Path to data blend JSON file
blend_path: ${oc.env:PWD}/src/nemotron/recipes/ultra3/stage1_sft/config/data_prep/data_blend_raw.json

# Output directory for packed Parquet data
output_dir: ${oc.env:PWD}/../output/ultra3/stage1_sft/tiny

num_shards: 4

# Tokenizer configuration (nested)
tokenizer:
  model: nvidia/NVIDIA-Nemotron-3-Ultra-550B-A55B-BF16
  add_bos: false
  add_eos: true

pack_size: 2048  # match the tiny training config's seq_length (2048)
algorithm: first_fit_shuffle
seed: null
parquet_row_group_size: 1000  # fine here: 2048-token packs are tiny
parquet_compression: zstd
train_ratio: 0.98
valid_ratio: 0.01
test_ratio: 0.01

# Chat template: 'ultra3', path to .jinja, or inline.
# Reuse the shared nano3 template (super3 does the same; the tech report does not specify an Ultra template). Swap to templates/ultra3.jinja only if the released Ultra tokenizer ships a different chat_template.
chat_template: nano3

messages_field: messages
tools_field: tools

# Filter to records whose used_in contains this tag.
# Matches the open SFT datasets' used_in tag (same as nano3/super3). Update if the released Ultra SFT data uses a distinct tag.
used_in_filter: nano_v3
used_in_field: used_in

max_doc_tokens: null
sample: 1000
sample_seed: 42
force: false
config_name: tiny

plan:
  planner_cpus: 0.5
download:
  batch_size: 1
  stage_cpus: 0.5
  hf_xet_high_performance: true
  hf_xet_concurrent_range_gets: 32
  max_retries: 3
  timeout_sec: 300
tokenization:
  cpus_per_worker: 1
observability:
  pipeline_logging_interval_s: 5
  wandb_log_pipeline_stats: true
