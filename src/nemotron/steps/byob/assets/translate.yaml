expt_name: byob_mcq_translation
dataset_path: /workspace/byob/outputs/byob_mcq_default/benchmark.parquet
output_dir: /workspace/byob/outputs
source_language: en-US
target_language: hi-IN
ndd_batch_size: 32

translation_model_config:
  mode: llm
  params:
    alias: gpt-oss-120b
    model: openai/gpt-oss-120b
    provider: nvidia
    inference_parameters:
      max_tokens: 16000
      max_parallel_requests: 8
      temperature:
        distribution_type: uniform
        params:
          low: 0.9
          high: 1.0

backtranslation_quality_metrics:
  - type: sacrebleu
    threshold: 25
  - type: chrf
    threshold: 50
  - type: ter
    threshold: 50

remove_low_quality: false
