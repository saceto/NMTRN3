run:
  env:
    mounts:
      - ${auto_mount:git+https://github.com/NVIDIA-NeMo/Curator.git@d10cd6ffe9f5ac4cbb176d7b3ada698f22633aea,/opt/Curator}

expt_name: byob_mcq_translation
stage: translate
dataset_path: /workspace/byob/outputs/byob_mcq_default/benchmark.parquet
output_dir: /workspace/byob/outputs
source_language: en-US
target_language: hi-IN

translation_model_config:
  backend_type: llm
  params:
    alias: gpt-oss-120b
    model: openai/gpt-oss-120b
    provider: nvidia
    api_key_env: NVIDIA_API_KEY
    base_url: https://integrate.api.nvidia.com/v1
    inference_parameters:
      max_tokens: 16000
      max_parallel_requests: 8
      temperature: 0.0
      top_p: 0.95
      extra_body:
        chat_template_kwargs:
          enable_thinking: false
  stage:
    segmentation_mode: coarse
    min_segment_chars: 0
    output_mode: both
  segment_stage:
    health_check: true
    max_concurrent_requests: 8

backtranslation_quality_metrics:
  - type: sacrebleu
    threshold: 25
  - type: chrf
    threshold: 50
  - type: ter
    threshold: 50

remove_low_quality: false
