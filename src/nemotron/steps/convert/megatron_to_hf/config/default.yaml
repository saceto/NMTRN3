# Convert a concrete Megatron checkpoint directory, normally an iter_* folder,
# into HuggingFace safetensors layout.
#
# Usage:
#   nemotron steps run convert/megatron_to_hf -c default \
#     megatron_path=/path/to/megatron/iter_0000100 \
#     hf_model_id=nvidia/NVIDIA-Nemotron-3-Nano-30B-A3B-Base-BF16 \
#     hf_path=/path/to/output_hf_checkpoint

run:
  env:
    container_image: nvcr.io/nvidia/nemo:26.04

megatron_path: null
hf_model_id: nvidia/NVIDIA-Nemotron-3-Nano-30B-A3B-Base-BF16
hf_path: ${oc.env:CONVERT_OUTPUT_DIR,${oc.env:NEMO_RUN_DIR,${oc.env:PWD}/output}/convert}/megatron_to_hf/hf

script:
  path: /opt/Megatron-Bridge/examples/conversion/convert_checkpoints_multi_gpu.py

trust_remote_code: true
show_progress: true
strict: true

# Distributed conversion is the default path so large checkpoints can be
# exported without loading all shards on one GPU.
distributed: true
tp: ${oc.env:NEMOTRON_CONVERT_TP,1}
pp: ${oc.env:NEMOTRON_CONVERT_PP,1}
ep: ${oc.env:NEMOTRON_CONVERT_EP,8}
etp: ${oc.env:NEMOTRON_CONVERT_ETP,1}
distributed_save: true
save_every_n_ranks: 1
torchrun:
  nproc_per_node: ${oc.env:NEMOTRON_CONVERT_NPROC_PER_NODE,8}
