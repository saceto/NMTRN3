# Pretrain bin/idx tokenisation. HF-dataset compatible via the blend file.

run:
  env:
    env_vars:
      WANDB_NAME: ${oc.env:WANDB_NAME,data-prep-pretrain-prep}

blend_path: /path/to/pretrain_blend.json   # references HF or local datasets
output_dir: /nemo_run/pretrain-binidx
num_shards: 128
valid_shards: 1
test_shards: 1
split_seed: 42

tokenizer:
  model: nvidia/NVIDIA-Nemotron-Nano-9B-v2
  add_bos: false
  add_eos: true

dtype: int32
text_field: text
min_doc_chars: null
max_doc_tokens: null

sample: null
sample_seed: 42
force: false

observability:
  pipeline_logging_interval_s: 30
