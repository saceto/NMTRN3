# Generate a Lepton env.lepton.toml that demonstrates step-linked profiles.
#
# The intent is not to enumerate every resource shape. Keep one reusable
# backend base, then add concrete profiles named after the steps they run.
# Child profiles show how env profile files support `extends` and selective overrides.

output_path: env.lepton.toml
force: false

preamble: |
  # Generated by `nemotron steps run env/env_toml -c lepton`.
  # Keep secrets and site-private names out of this file; pass them through
  # ${oc.env:...} placeholders.
  #
  # Example usage after review:
  #   export NEMOTRON_ENV_FILE=env.lepton.toml
  #   uv run nemotron steps run data_prep/sft_packing -c tiny --batch lepton_prep_sft_packing
  #   uv run nemotron steps run data_prep/pretrain_prep -c tiny --batch lepton_prep_pretrain_prep
  #   uv run nemotron steps run data_prep/rl_prep -c tiny --batch lepton_prep_rl_prep
  #   uv run nemotron steps run pretrain/megatron_bridge -c tiny --batch lepton_pretrain_megatron_bridge
  #   uv run nemotron steps run pretrain/automodel -c tiny --batch lepton_pretrain_automodel
  #   uv run nemotron steps run sft/megatron_bridge -c tiny --batch lepton_sft_megatron_bridge
  #   uv run nemotron steps run sft/automodel -c tiny --batch lepton_sft_automodel
  #   uv run nemotron steps run peft/megatron_bridge -c tiny --batch lepton_peft_megatron_bridge
  #   uv run nemotron steps run peft/automodel -c tiny --batch lepton_peft_automodel
  #   uv run nemotron steps run rl/nemo_rl/dpo -c tiny --batch lepton_rl_nemo_rl_dpo
  #   uv run nemotron steps run rl/nemo_rl/rlvr -c tiny --batch lepton_rl_nemo_rl_rlvr
  #   uv run nemotron steps run rl/nemo_rl/rlhf -c tiny --batch lepton_rl_nemo_rl_rlhf
  #   uv run nemotron steps run optimize/modelopt/quantize -c tiny --batch lepton_optimize_modelopt_quantize
  #   uv run nemotron steps run optimize/modelopt/distill -c tiny --batch lepton_optimize_modelopt_distill
  #   uv run nemotron steps run optimize/modelopt/prune -c tiny --batch lepton_optimize_modelopt_prune
  #   uv run nemotron steps run eval/model_eval -c tiny --batch lepton_eval_model_eval
  #   uv run nemotron steps run byob -c tiny --batch lepton_byob_cpu stage=all
  #   uv run nemotron steps run byob -c tiny --batch lepton_byob_full stage=all
  #   uv run nemotron steps run sdg/data_designer -c tiny --batch lepton_sdg_data_designer_tiny
  #   uv run nemotron steps run translate/translation -c default --batch lepton_translate
  #   uv run nemotron steps run curate/nemo_curator -c tiny --batch lepton_curate

checks:
  required_profiles:
    - lepton_base
    - lepton_curator_base
    - lepton_prep_base
    - lepton_prep_sft_packing
    - lepton_prep_pretrain_prep
    - lepton_prep_rl_prep
    - lepton_pretrain_megatron_bridge
    - lepton_pretrain_automodel
    - lepton_sft_megatron_bridge
    - lepton_sft_automodel
    - lepton_peft_megatron_bridge
    - lepton_peft_automodel
    - lepton_rl_nemo_rl_dpo
    - lepton_rl_nemo_rl_rlvr
    - lepton_rl_nemo_rl_rlhf
    - lepton_optimize_modelopt_quantize
    - lepton_optimize_modelopt_distill
    - lepton_optimize_modelopt_prune
    - lepton_eval_model_eval
    - lepton_byob_cpu
    - lepton_byob_full
    - lepton_sdg_data_designer
    - lepton_sdg_data_designer_tiny
    - lepton_sdg_data_designer_default
    - lepton_sdg_data_designer_customer_support_tools
    - lepton_sdg_data_designer_rl_pref
    - lepton_translate
    - lepton_curate
  recommended_min_nodes:
    # RLHF with GenRM needs policy/generation workers, NeMo-Gym GPU servers, and placement headroom.
    lepton_rl_nemo_rl_rlhf: 4

sections:
  wandb:
    project: nemotron
    entity: ${oc.env:WANDB_ENTITY,nvidia}

  lepton_base:
    executor: lepton
    container_image: nvcr.io/nvidia/nemo:25.11.nemotron_3_nano
    # Replace this with your private Lepton node group in the generated file.
    node_group: lepton-node-group
    resource_shape: ${oc.env:LEPTON_GPU_SHAPE,gpu.8xa100-80gb}
    nemo_run_dir: ${oc.env:NEMO_RUN_DIR,/mnt/lustre-shared/nemo-run}
    remote_job_dir: ${oc.env:NEMOTRON_REMOTE_JOB_DIR,/mnt/lustre-shared/output}
    workspace: ${oc.env:NEMOTRON_WORKSPACE,/mnt/lustre-shared}
    # Lepton may lag NeMo-RL's upstream Ray pin; override only after your workspace supports it.
    ray_version: "2.48.0"
    nodes: 1
    gpus_per_node: 8
    nprocs_per_node: 8
    shared_memory_size: 65536
    pip_extras: [typer, rich, pydantic-settings]
    mounts:
      - path: ${oc.env:NEMOTRON_HOST_MOUNT,/path/to/shared/workspace}
        mount_path: ${oc.env:NEMOTRON_WORKSPACE,/mnt/lustre-shared}
        from: ${oc.env:NEMOTRON_MOUNT_FROM,node-nfs:amlfs}
    env_vars:
      HF_TOKEN: ${oc.env:HF_TOKEN,''}
      HF_HOME: ${oc.env:HF_HOME,/mnt/lustre-shared/hf}
      WANDB_API_KEY: ${oc.env:WANDB_API_KEY,''}
      WANDB_PROJECT: nemotron
      RAY_DEDUP_LOGS: "0"
      RAY_GRAFANA_IFRAME_HOST: ""

  # data_prep/*: prep jobs are CPU-only. Override the GPU base so Lepton
  # schedules a CPU shape and the executor does not request GPUs.
  lepton_prep_base:
    extends: lepton_base
    resource_shape: ${oc.env:LEPTON_CPU_SHAPE,cpu.medium}
    gpus_per_node: 0
    nprocs_per_node: 1
    startup_commands:
      - python -m pip install --quiet --break-system-packages cosmos-xenna protobuf
    env_vars:
      RAY_RUNTIME_ENV_PYTHONPATH: /mnt/lustre-shared/_nemotron/src

  lepton_prep_sft_packing:
    extends: lepton_prep_base
    env_vars:
      SFT_OUTPUT_DIR: /mnt/lustre-shared/output/data_prep/sft_packing
      RAY_RUNTIME_ENV_PYTHONPATH: /mnt/lustre-shared/_nemotron/src

  lepton_prep_pretrain_prep:
    extends: lepton_prep_base
    env_vars:
      PRETRAIN_OUTPUT_DIR: /mnt/lustre-shared/output/data_prep/pretrain_prep
      RAY_RUNTIME_ENV_PYTHONPATH: /mnt/lustre-shared/_nemotron/src

  lepton_prep_rl_prep:
    extends: lepton_prep_base
    env_vars:
      RL_OUTPUT_DIR: /mnt/lustre-shared/output/data_prep/rl_prep
      RAY_RUNTIME_ENV_PYTHONPATH: /mnt/lustre-shared/_nemotron/src

  # Curator-backed steps: byob, translate, and curate all use the Curator
  # container. Step YAML declares any /opt/Curator source mount; these profiles
  # provide executor resources and runtime deps.
  lepton_curator_base:
    extends: lepton_base
    container_image: nvcr.io/nvidia/nemo-curator:26.02
    resource_shape: ${oc.env:LEPTON_CPU_SHAPE,cpu.medium}
    nodes: 1
    gpus_per_node: 0
    nprocs_per_node: 1
    shared_memory_size: 4096
    pip_extras: []
    pre_launch_commands:
      - export RAY_worker_maximum_startup_concurrency=16
      - export RAY_num_prestart_python_workers=16
      - wget() { printf '%s\n' '#!/usr/bin/env bash' > init.sh; }

  # byob CPU smoke: keeps semantic dedup, coverage, and semantic outlier stages
  # disabled. Those optional stages need the GPU/RAPIDS profile below.
  lepton_byob_cpu:
    extends: lepton_curator_base
    startup_commands:
      - rm -rf /tmp/byob-venv && python -m venv --system-site-packages /tmp/byob-venv
      - PIP_DISABLE_PIP_VERSION_CHECK=1 /tmp/byob-venv/bin/python -m pip install --quiet uv
      - /tmp/byob-venv/bin/uv pip install --python /tmp/byob-venv/bin/python --quiet --no-cache cosmos-xenna==0.2.0 data-designer==0.5.5 bcp47==0.1.0 pandas==2.3.3 pyarrow pyyaml numpy==2.2.6 datasets tqdm pydantic requests
    run_command: PYTHONPATH=/opt/Curator:$PYTHONPATH /tmp/byob-venv/bin/python -m nemotron.steps.byob.step --config {config}
    env_vars:
      NVIDIA_API_KEY: ${oc.env:NVIDIA_API_KEY,''}
      NGC_API_KEY: ${oc.env:NGC_API_KEY,''}

  # byob full: adds the heavy GPU stack required by Curator semantic dedup and
  # related embedding/semantic quality stages.
  lepton_byob_full:
    extends: lepton_byob_cpu
    resource_shape: ${oc.env:LEPTON_BYOB_GPU_SHAPE,gpu.a100-80gb}
    gpus_per_node: 1
    shared_memory_size: 8192
    startup_commands:
      - rm -rf /tmp/byob-venv && python -m venv --system-site-packages /tmp/byob-venv
      - PIP_DISABLE_PIP_VERSION_CHECK=1 /tmp/byob-venv/bin/python -m pip install --quiet uv
      - /tmp/byob-venv/bin/uv pip install --python /tmp/byob-venv/bin/python --quiet --no-cache cosmos-xenna==0.2.0 data-designer==0.5.5 bcp47==0.1.0 pandas==2.3.3 pyarrow pyyaml numpy==2.2.6 datasets tqdm pydantic requests urllib3==1.26.20
      - /tmp/byob-venv/bin/uv pip install --python /tmp/byob-venv/bin/python --quiet --no-cache --extra-index-url https://pypi.nvidia.com cupy-cuda12x==14.0.1 cudf-cu12==25.10.0 cuml-cu12==25.10.0
      - /tmp/byob-venv/bin/uv pip install --python /tmp/byob-venv/bin/python --quiet --no-cache torch==2.10.0 --index-url https://download.pytorch.org/whl/cu128
      - /tmp/byob-venv/bin/uv pip install --python /tmp/byob-venv/bin/python --quiet --no-cache --no-deps sentence-transformers==5.4.1
      - /tmp/byob-venv/bin/uv pip install --python /tmp/byob-venv/bin/python --quiet --no-cache 'transformers<5' scikit-learn==1.7.2 sacrebleu==2.6.0 iso639-lang==2.6.3

  # sdg/data_designer: CPU-only synthetic generation through remote model
  # endpoints. Config variants choose SFT vs tool-call vs RL preference output.
  lepton_sdg_data_designer:
    extends: lepton_base
    resource_shape: ${oc.env:LEPTON_CPU_SHAPE,cpu.medium}
    gpus_per_node: 0
    nprocs_per_node: 1
    shared_memory_size: 4096
    startup_commands:
      - python -m pip install --quiet --break-system-packages data-designer==0.5.5
    env_vars:
      SDG_OUTPUT_DIR: /mnt/lustre-shared/output/sdg
      NVIDIA_API_KEY: ${oc.env:NVIDIA_API_KEY,''}

  lepton_sdg_data_designer_tiny:
    extends: lepton_sdg_data_designer
    env_vars:
      SDG_OUTPUT_DIR: /mnt/lustre-shared/output/sdg/sft/tiny

  lepton_sdg_data_designer_default:
    extends: lepton_sdg_data_designer
    env_vars:
      SDG_OUTPUT_DIR: /mnt/lustre-shared/output/sdg/sft/default

  lepton_sdg_data_designer_customer_support_tools:
    extends: lepton_sdg_data_designer
    env_vars:
      SDG_OUTPUT_DIR: /mnt/lustre-shared/output/sdg/sft/customer_support_tools

  lepton_sdg_data_designer_rl_pref:
    extends: lepton_sdg_data_designer
    env_vars:
      SDG_OUTPUT_DIR: /mnt/lustre-shared/output/sdg/rl/rl_pref

  # translate/translation: use mounted /opt/Curator plus a small target install
  # for the Xenna version required by the pinned Curator checkout.
  lepton_translate:
    extends: lepton_curator_base
    resource_shape: ${oc.env:LEPTON_TRANSLATE_GPU_SHAPE,gpu.a100-80gb}
    gpus_per_node: 1
    shared_memory_size: 8192
    startup_commands:
      - rm -rf /tmp/translate-uv /tmp/translate-site && python -m venv /tmp/translate-uv
      - PIP_DISABLE_PIP_VERSION_CHECK=1 /tmp/translate-uv/bin/python -m pip install --quiet uv
      - /tmp/translate-uv/bin/uv pip install --quiet --no-deps --target /tmp/translate-site cosmos-xenna==0.2.0 obstore==0.8.2 portpicker==1.6.0 pulp==3.3.0 attrs==25.4.0 cattrs==25.3.0 jinja2==3.1.6 loguru==0.7.3 tabulate==0.9.0
    run_command: PYTHONPATH=/opt/Curator:/tmp/translate-site:$PYTHONPATH python -m nemotron.steps.translate.translation.step --config {config}
    env_vars:
      NVIDIA_API_KEY: ${oc.env:NVIDIA_API_KEY,''}
      NGC_API_KEY: ${oc.env:NGC_API_KEY,''}

  # curate/nemo_curator: runs the Curator container out of the box. The CPU
  # count avoids Xenna streaming-mode failures on medium CPU pods.
  lepton_curate:
    extends: lepton_curator_base
    env_vars:
      NEMOTRON_CURATOR_RAY_NUM_CPUS: "4"

  # pretrain/megatron_bridge: same NeMo image as SFT, with pretrain output wiring.
  lepton_pretrain_megatron_bridge:
    extends: lepton_base
    nodes: 2
    env_vars:
      PRETRAIN_OUTPUT_DIR: /mnt/lustre-shared/output/pretrain/megatron_bridge
      PRETRAIN_BLEND_PATH: /mnt/lustre-shared/output/data_prep/pretrain_prep/blend.json

  # pretrain/automodel: AutoModel pretrain uses the AutoModel image/deps with
  # the same pretrain data-prep output wiring.
  lepton_pretrain_automodel:
    extends: lepton_base
    container_image: nvcr.io/nvidia/nemo-automodel:26.04
    nodes: 2
    startup_commands:
      - python -m pip install --quiet --break-system-packages omegaconf
    env_vars:
      PRETRAIN_OUTPUT_DIR: /mnt/lustre-shared/output/pretrain/automodel
      PRETRAIN_BLEND_PATH: /mnt/lustre-shared/output/data_prep/pretrain_prep/blend.json

  # sft/megatron_bridge: overrides only scale and output location.
  lepton_sft_megatron_bridge:
    extends: lepton_base
    nodes: 2
    env_vars:
      SFT_OUTPUT_DIR: /mnt/lustre-shared/output/sft/megatron_bridge
      SFT_PACKED_DIR: /mnt/lustre-shared/output/data_prep/sft_packing/splits/train/*.parquet

  # sft/automodel: demonstrates extending an individual step profile and changing image/deps.
  lepton_sft_automodel:
    extends: lepton_sft_megatron_bridge
    container_image: nvcr.io/nvidia/nemo-automodel:26.04
    startup_commands:
      - python -m pip install --quiet --break-system-packages omegaconf
    env_vars:
      SFT_OUTPUT_DIR: /mnt/lustre-shared/output/sft/automodel

  # peft/*: PEFT uses the same training backends as SFT but writes to PEFT paths.
  lepton_peft_megatron_bridge:
    extends: lepton_sft_megatron_bridge
    env_vars:
      SFT_OUTPUT_DIR: /mnt/lustre-shared/output/peft/megatron_bridge
      SFT_PACKED_DIR: /mnt/lustre-shared/output/data_prep/sft_packing/splits/train/*.parquet

  lepton_peft_automodel:
    extends: lepton_sft_automodel
    env_vars:
      SFT_OUTPUT_DIR: /mnt/lustre-shared/output/peft/automodel

  # rl/nemo_rl/dpo: NeMo-RL image plus output override. Runtime RL knobs stay in step YAML.
  lepton_rl_nemo_rl_dpo:
    extends: lepton_base
    container_image: nvcr.io/nvidia/nemo-rl:v0.6.0
    nodes: 2
    startup_commands:
      - python -m pip install --quiet --break-system-packages omegaconf
    env_vars:
      RL_OUTPUT_DIR: /mnt/lustre-shared/output/rl/dpo

  # rl/nemo_rl/rlvr: same NeMo-RL image, with GRPO/RLVR output wiring.
  lepton_rl_nemo_rl_rlvr:
    extends: lepton_rl_nemo_rl_dpo
    env_vars:
      RL_OUTPUT_DIR: /mnt/lustre-shared/output/rl/rlvr

  # rl/nemo_rl/rlhf: same RL profile, but more physical nodes for GenRM/NeMo-Gym placement.
  lepton_rl_nemo_rl_rlhf:
    extends: lepton_rl_nemo_rl_dpo
    nodes: 4
    env_vars:
      RL_OUTPUT_DIR: /mnt/lustre-shared/output/rl/rlhf

  # optimize/modelopt/quantize: ModelOpt runs against the NeMo image where ModelOpt examples work.
  lepton_optimize_modelopt_quantize:
    extends: lepton_base
    container_image: nvcr.io/nvidia/nemo:26.02
    nodes: 2
    env_vars:
      OPTIM_OUTPUT_DIR: /mnt/lustre-shared/output/optimize/quantize

  # optimize/modelopt/distill: same ModelOpt-capable image with distillation output wiring.
  lepton_optimize_modelopt_distill:
    extends: lepton_optimize_modelopt_quantize
    env_vars:
      OPTIM_OUTPUT_DIR: /mnt/lustre-shared/output/optimize/distill

  # optimize/modelopt/prune: pruning can run on a smaller 2-GPU shape.
  lepton_optimize_modelopt_prune:
    extends: lepton_base
    container_image: nvcr.io/nvidia/nemo:26.02
    resource_shape: ${oc.env:LEPTON_PRUNE_GPU_SHAPE,gpu.2xa100-80gb}
    gpus_per_node: 2
    nprocs_per_node: 2
    env_vars:
      OPTIM_OUTPUT_DIR: /mnt/lustre-shared/output/optimize/prune

  # eval/model_eval: lightweight profile for model evaluation steps.
  lepton_eval_model_eval:
    extends: lepton_base
    nodes: 1
    env_vars:
      EVAL_OUTPUT_DIR: /mnt/lustre-shared/output/eval/model_eval
