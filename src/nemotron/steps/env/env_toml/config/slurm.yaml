# Generate a Slurm env.slurm.toml that demonstrates step-linked profiles.
#
# This mirrors the Lepton example: one backend base plus concrete profiles
# named for individual steps. Replace host/account/paths with site values.

output_path: env.slurm.toml
force: false

preamble: |
  # Generated by `nemotron steps run env/env_toml -c slurm`.
  # Keep secrets out of this file; pass tokens through ${oc.env:...} placeholders.
  #
  # Example usage after review:
  #   export NEMOTRON_ENV_FILE=env.slurm.toml
  #   uv run nemotron steps run data_prep/sft_packing -c tiny --batch slurm_prep_sft_packing
  #   uv run nemotron steps run pretrain/megatron_bridge -c tiny --batch slurm_pretrain_megatron_bridge
  #   uv run nemotron steps run sft/megatron_bridge -c tiny --batch slurm_sft_megatron_bridge
  #   uv run nemotron steps run rl/nemo_rl/dpo -c tiny --batch slurm_rl_nemo_rl_dpo
  #   uv run nemotron steps run rl/nemo_rl/rlvr -c tiny --batch slurm_rl_nemo_rl_rlvr
  #   uv run nemotron steps run rl/nemo_rl/rlhf -c tiny --batch slurm_rl_nemo_rl_rlhf
  #   uv run nemotron steps run optimize/modelopt/quantize -c tiny --batch slurm_optimize_modelopt_quantize
  #   uv run nemotron steps run byob -c tiny --batch slurm_byob_cpu stage=all
  #   uv run nemotron steps run byob -c tiny --batch slurm_byob_full stage=all
  #   uv run nemotron steps run sdg/data_designer -c tiny --batch slurm_sdg_data_designer_tiny
  #   uv run nemotron steps run translate/translation -c default --batch slurm_translate
  #   uv run nemotron steps run curate/nemo_curator -c tiny --batch slurm_curate

checks:
  required_profiles:
    - slurm_base
    - slurm_curator_base
    - slurm_prep_sft_packing
    - slurm_pretrain_megatron_bridge
    - slurm_sft_megatron_bridge
    - slurm_rl_nemo_rl_dpo
    - slurm_rl_nemo_rl_rlvr
    - slurm_rl_nemo_rl_rlhf
    - slurm_optimize_modelopt_quantize
    - slurm_byob_cpu
    - slurm_byob_full
    - slurm_sdg_data_designer
    - slurm_sdg_data_designer_tiny
    - slurm_sdg_data_designer_default
    - slurm_sdg_data_designer_customer_support_tools
    - slurm_sdg_data_designer_rl_pref
    - slurm_translate
    - slurm_curate

sections:
  wandb:
    project: nemotron
    entity: ${oc.env:WANDB_ENTITY,nvidia}

  slurm_base:
    executor: slurm
    tunnel: ssh
    host: ${oc.env:SLURM_HOST,login.example.com}
    user: ${oc.env:USER}
    account: ${oc.env:SLURM_ACCOUNT,nemotron}
    partition: ${oc.env:SLURM_PARTITION,batch}
    container_image: nvcr.io/nvidia/nemo:25.11.nemotron_3_nano
    remote_job_dir: ${oc.env:NEMO_RUN_DIR,/lustre/${oc.env:USER}/nemo-run}
    mounts:
      - /lustre:/lustre
    lustre_mount: ""
    nodes: 1
    ntasks_per_node: 8
    gpus_per_node: 8
    time: "02:00:00"
    env_vars:
      HF_TOKEN: ${oc.env:HF_TOKEN,''}
      HF_HOME: ${oc.env:HF_HOME,/lustre/${oc.env:USER}/hf}
      WANDB_API_KEY: ${oc.env:WANDB_API_KEY,''}
      WANDB_PROJECT: nemotron
      PYTHONPATH: /nemo_run/code/src
      RAY_DEDUP_LOGS: "0"

  # data_prep/sft_packing: data prep is CPU-only. Override the GPU base so Slurm
  # does not submit to GPU partitions or request GPUs for the image import/job.
  slurm_prep_sft_packing:
    extends: slurm_base
    partition: ${oc.env:SLURM_CPU_PARTITION,cpu}
    build_partition: ${oc.env:SLURM_CPU_PARTITION,cpu}
    build_include_gpus: false
    build_gpus_per_node: 0
    ntasks_per_node: 1
    cpus_per_task: 4
    gpus_per_node: 0
    time: "01:00:00"
    startup_commands:
      - uv pip install --python /opt/venv/bin/python --quiet cosmos-xenna protobuf
    env_vars:
      SFT_OUTPUT_DIR: /lustre/${oc.env:USER}/output/sft/packed
      RAY_RUNTIME_ENV_PYTHONPATH: /nemo_run/code/src
      RAY_MAX_LIMIT_FROM_API_SERVER: "100000"

  # Curator-backed steps: byob, translate, and curate all use the Curator
  # container. Step YAML declares any /opt/Curator source mount; these profiles
  # provide Slurm resources and runtime deps.
  slurm_curator_base:
    extends: slurm_base
    container_image: nvcr.io/nvidia/nemo-curator:26.02
    partition: ${oc.env:SLURM_CPU_PARTITION,cpu}
    build_partition: ${oc.env:SLURM_CPU_PARTITION,cpu}
    build_include_gpus: false
    build_gpus_per_node: 0
    ntasks_per_node: 1
    cpus_per_task: 4
    gpus_per_node: 0
    time: "01:00:00"

  # byob CPU smoke: keeps semantic dedup, coverage, and semantic outlier stages
  # disabled. Those optional stages need the GPU/RAPIDS profile below.
  slurm_byob_cpu:
    extends: slurm_curator_base
    startup_commands:
      - rm -rf /tmp/byob-venv && python -m venv --system-site-packages /tmp/byob-venv
      - PIP_DISABLE_PIP_VERSION_CHECK=1 /tmp/byob-venv/bin/python -m pip install --quiet uv
      - /tmp/byob-venv/bin/uv pip install --python /tmp/byob-venv/bin/python --quiet --no-cache cosmos-xenna==0.2.0 data-designer==0.5.5 bcp47==0.1.0 pandas==2.3.3 pyarrow pyyaml numpy==2.2.6 datasets tqdm pydantic requests urllib3==1.26.20
      - export PYTHONPATH=/opt/Curator:$PYTHONPATH
      - source /tmp/byob-venv/bin/activate
    run_command: PYTHONPATH=/opt/Curator:$PYTHONPATH /tmp/byob-venv/bin/python -m nemotron.steps.byob.step --config {config}
    env_vars:
      NVIDIA_API_KEY: ${oc.env:NVIDIA_API_KEY,''}
      NGC_API_KEY: ${oc.env:NGC_API_KEY,''}

  # byob full: adds the heavy GPU stack required by Curator semantic dedup and
  # related embedding/semantic quality stages.
  slurm_byob_full:
    extends: slurm_byob_cpu
    partition: ${oc.env:SLURM_GPU_PARTITION,${oc.env:SLURM_PARTITION,batch}}
    build_partition: ${oc.env:SLURM_GPU_PARTITION,${oc.env:SLURM_PARTITION,batch}}
    build_include_gpus: true
    build_gpus_per_node: 1
    ntasks_per_node: 1
    cpus_per_task: 8
    gpus_per_node: 1
    time: "02:00:00"
    startup_commands:
      - rm -rf /tmp/byob-venv && python -m venv --system-site-packages /tmp/byob-venv
      - PIP_DISABLE_PIP_VERSION_CHECK=1 /tmp/byob-venv/bin/python -m pip install --quiet uv
      - /tmp/byob-venv/bin/uv pip install --python /tmp/byob-venv/bin/python --quiet --no-cache cosmos-xenna==0.2.0 data-designer==0.5.5 bcp47==0.1.0 pandas==2.3.3 pyarrow pyyaml numpy==2.2.6 datasets tqdm pydantic requests urllib3==1.26.20
      - /tmp/byob-venv/bin/uv pip install --python /tmp/byob-venv/bin/python --quiet --no-cache --extra-index-url https://pypi.nvidia.com cupy-cuda12x==14.0.1 cuda-bindings==12.9.4 cuda-python==12.9.4 cudf-cu12==25.10.0 cuml-cu12==25.10.0 pylibcugraph-cu12==25.10.1 pylibraft-cu12==25.10.0 raft-dask-cu12==25.10.0 rapidsmpf-cu12==25.10.0
      - /tmp/byob-venv/bin/uv pip install --python /tmp/byob-venv/bin/python --quiet --no-cache sentence-transformers==5.4.1 scikit-learn==1.7.2 sacrebleu==2.6.0 iso639-lang==2.6.3
      - export PYTHONPATH=/opt/Curator:$PYTHONPATH
      - source /tmp/byob-venv/bin/activate

  # sdg/data_designer: CPU-only synthetic generation through remote model
  # endpoints. Config variants choose SFT vs tool-call vs RL preference output.
  slurm_sdg_data_designer:
    extends: slurm_base
    container_image: nvcr.io/nvidia/nemo:25.11.nemotron_3_nano
    partition: ${oc.env:SLURM_CPU_PARTITION,cpu}
    build_partition: ${oc.env:SLURM_CPU_PARTITION,cpu}
    build_include_gpus: false
    build_gpus_per_node: 0
    ntasks_per_node: 1
    cpus_per_task: 4
    gpus_per_node: 0
    time: "01:00:00"
    startup_commands:
      - python -m pip install --quiet --break-system-packages data-designer==0.5.5
    env_vars:
      SDG_OUTPUT_DIR: /lustre/${oc.env:USER}/output/sdg
      NVIDIA_API_KEY: ${oc.env:NVIDIA_API_KEY,''}

  slurm_sdg_data_designer_tiny:
    extends: slurm_sdg_data_designer
    env_vars:
      SDG_OUTPUT_DIR: /lustre/${oc.env:USER}/output/sdg/sft/tiny

  slurm_sdg_data_designer_default:
    extends: slurm_sdg_data_designer
    env_vars:
      SDG_OUTPUT_DIR: /lustre/${oc.env:USER}/output/sdg/sft/default

  slurm_sdg_data_designer_customer_support_tools:
    extends: slurm_sdg_data_designer
    env_vars:
      SDG_OUTPUT_DIR: /lustre/${oc.env:USER}/output/sdg/sft/customer_support_tools

  slurm_sdg_data_designer_rl_pref:
    extends: slurm_sdg_data_designer
    env_vars:
      SDG_OUTPUT_DIR: /lustre/${oc.env:USER}/output/sdg/rl/rl_pref

  # translate/translation: use mounted /opt/Curator plus a small target install
  # for the Xenna version required by the pinned Curator checkout.
  slurm_translate:
    extends: slurm_curator_base
    partition: ${oc.env:SLURM_GPU_PARTITION,${oc.env:SLURM_PARTITION,batch}}
    build_partition: ${oc.env:SLURM_GPU_PARTITION,${oc.env:SLURM_PARTITION,batch}}
    build_include_gpus: true
    build_gpus_per_node: 1
    ntasks_per_node: 1
    cpus_per_task: 8
    gpus_per_node: 1
    time: "02:00:00"
    startup_commands:
      - rm -rf /tmp/translate-uv /tmp/translate-site && python -m venv /tmp/translate-uv
      - PIP_DISABLE_PIP_VERSION_CHECK=1 /tmp/translate-uv/bin/python -m pip install --quiet uv
      - /tmp/translate-uv/bin/uv pip install --quiet --no-deps --target /tmp/translate-site cosmos-xenna==0.2.0 obstore==0.8.2 portpicker==1.6.0 pulp==3.3.0 attrs==25.4.0 cattrs==25.3.0 jinja2==3.1.6 loguru==0.7.3 tabulate==0.9.0
      - export PYTHONPATH=/opt/Curator:/tmp/translate-site:$PYTHONPATH
    run_command: PYTHONPATH=/opt/Curator:/tmp/translate-site:$PYTHONPATH python -m nemotron.steps.translate.translation.step --config {config}
    env_vars:
      NVIDIA_API_KEY: ${oc.env:NVIDIA_API_KEY,''}
      NGC_API_KEY: ${oc.env:NGC_API_KEY,''}

  # curate/nemo_curator: runs the Curator container out of the box. The CPU
  # count avoids Xenna streaming-mode failures on small CPU allocations.
  slurm_curate:
    extends: slurm_curator_base
    env_vars:
      NEMOTRON_CURATOR_RAY_NUM_CPUS: "4"

  # pretrain/megatron_bridge: child overrides scale/time and pretrain output path.
  slurm_pretrain_megatron_bridge:
    extends: slurm_base
    nodes: 2
    ntasks_per_node: 8
    time: "04:00:00"
    env_vars:
      PRETRAIN_OUTPUT_DIR: /lustre/${oc.env:USER}/output/pretrain/megatron_bridge

  # sft/megatron_bridge: child overrides scale/time while inheriting site logistics.
  slurm_sft_megatron_bridge:
    extends: slurm_base
    nodes: 2
    ntasks_per_node: 8
    time: "04:00:00"
    env_vars:
      SFT_OUTPUT_DIR: /lustre/${oc.env:USER}/output/sft/megatron_bridge

  # rl/nemo_rl/dpo: switch image for NeMo-RL while keeping tunnel/account/mounts.
  slurm_rl_nemo_rl_dpo:
    extends: slurm_base
    container_image: nvcr.io/nvidia/nemo-rl:v0.6.0
    nodes: 2
    time: "04:00:00"
    startup_commands:
      - python -m pip install --quiet --break-system-packages omegaconf
    env_vars:
      RL_OUTPUT_DIR: /lustre/${oc.env:USER}/output/rl/dpo

  # rl/nemo_rl/rlvr: same NeMo-RL image, with RLVR output wiring.
  slurm_rl_nemo_rl_rlvr:
    extends: slurm_rl_nemo_rl_dpo
    env_vars:
      RL_OUTPUT_DIR: /lustre/${oc.env:USER}/output/rl/rlvr

  # rl/nemo_rl/rlhf: same RL profile, but more physical nodes for GenRM/NeMo-Gym placement.
  slurm_rl_nemo_rl_rlhf:
    extends: slurm_rl_nemo_rl_dpo
    nodes: 4
    env_vars:
      RL_OUTPUT_DIR: /lustre/${oc.env:USER}/output/rl/rlhf

  # optimize/modelopt/quantize: switch to the ModelOpt-capable NeMo image.
  slurm_optimize_modelopt_quantize:
    extends: slurm_base
    container_image: nvcr.io/nvidia/nemo:26.02
    nodes: 2
    time: "04:00:00"
    env_vars:
      OPTIM_OUTPUT_DIR: /lustre/${oc.env:USER}/output/optimize/quantize
