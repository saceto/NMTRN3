defaults: default.yaml

run:
  env:
    nodes: 2
    gpus_per_node: 8
    nprocs_per_node: 8

args:
  use_mock_data: true
  seq_length: 1024
  gbs: 8
  train_iters: 2
  lr_warmup_iters: 1
  eval_interval: 1
  eval_iters: 1
  output_dir: ${oc.env:OPTIM_OUTPUT_DIR,${oc.env:PWD}/output}/distill/tiny

torchrun:
  nproc_per_node: 8
