[step]
id = "optimize/modelopt/distill"
name = "Distillation (ModelOpt + Megatron-Bridge)"
category = "optimize"
description = """\
Distill a student model from a teacher model with NVIDIA Model Optimizer and
Megatron-Bridge. Can run standalone or recover quality after pruning or
quantization; real-data runs consume Megatron bin/idx data."""
tags = ["optimize", "modelopt", "distillation", "teacher-student", "megatron-bridge"]

[[consumes]]
type = "checkpoint_hf"
description = "Teacher and student HuggingFace checkpoints."
required = true

[[consumes]]
type = "binidx"
description = "Optional real distillation data from prep/pretrain_prep. Not needed when use_mock_data=true."
required = false

[[produces]]
type = "checkpoint_megatron"
description = "Distilled Megatron distributed checkpoint."

[[parameters]]
name = "args.teacher_hf_path"
description = "Teacher HF checkpoint path or model id."

[[parameters]]
name = "args.student_hf_path"
description = "Student HF checkpoint path or model id."

[[parameters]]
name = "args.data_paths"
description = "Megatron data blend CLI sequence: [weight, prefix, ...]."

[[parameters]]
name = "args.use_mock_data"
description = "Run a smoke test without real bin/idx data."
default = false

[[parameters]]
name = "extra_args"
description = "Literal upstream args for newly added ModelOpt distillation flags."
default = []

[[strategies]]
when = "Recovering quality after pruning or quantization"
then = "Use the original BF16 checkpoint as teacher and the optimized checkpoint as student."

[[strategies]]
when = "Smoke testing plumbing"
then = "Set args.use_mock_data=true, args.seq_length=512, args.train_iters=100, and small args.eval_iters."

[[strategies]]
when = "Need a HuggingFace checkpoint"
then = "Set args.hf_export_path and args.student_hf_model, or convert a saved Megatron iteration later."

[reference]
modelopt_repo = "https://github.com/NVIDIA/Model-Optimizer"
modelopt_readme = "https://github.com/NVIDIA/Model-Optimizer/blob/main/README.md"
modelopt_docs = "https://nvidia.github.io/Model-Optimizer/"
modelopt_megatron_bridge_readme = "https://github.com/NVIDIA/Model-Optimizer/blob/main/examples/megatron_bridge/README.md"
megatron_bridge_repo = "https://github.com/NVIDIA-NeMo/Megatron-Bridge"
megatron_bridge_docs = "https://docs.nvidia.com/nemo/megatron-bridge/latest/"
megatron_bridge_distillation_docs = "https://docs.nvidia.com/nemo/megatron-bridge/latest/training/distillation.html"
skills = ["skills/nemotron-customize/context/modelopt-optimization.txt"]
