[step]
id = "optimize/modelopt/prune"
name = "Pruning (ModelOpt + Megatron-Bridge)"
category = "optimize"
description = """\
Prune HuggingFace GPT/Mamba-family checkpoints with NVIDIA Model Optimizer and
Megatron-Bridge. Supports target-parameter search or manual architecture
pruning via config-controlled upstream arguments."""
tags = ["optimize", "modelopt", "pruning", "structured-pruning", "megatron-bridge"]

[[consumes]]
type = "checkpoint_hf"
description = "HuggingFace model or checkpoint to prune."
required = true

[[produces]]
type = "checkpoint_hf"
description = "Pruned HuggingFace checkpoint."

[[parameters]]
name = "args.prune_target_params"
description = "Target parameter count for search, e.g. 6e9."
default = 6e9

[[parameters]]
name = "args.prune_export_config"
description = "Manual architecture dict such as hidden_size / ffn_hidden_size / num_layers."

[[parameters]]
name = "args.hparams_to_skip"
description = "Architecture hparams to leave untouched, e.g. num_attention_heads."

[[parameters]]
name = "extra_args"
description = "Literal upstream args for newly added ModelOpt pruning flags."
default = []

[[strategies]]
when = "You know the target model budget"
then = "Set args.prune_target_params and leave args.prune_export_config null so ModelOpt searches candidates."

[[strategies]]
when = "You need a specific architecture"
then = "Set args.prune_export_config and set args.prune_target_params=null."

[[strategies]]
when = "Layer count does not divide PP size"
then = "Use args.num_layers_in_first_pipeline_stage / args.num_layers_in_last_pipeline_stage for uneven PP."

[reference]
modelopt_repo = "https://github.com/NVIDIA/Model-Optimizer"
modelopt_readme = "https://github.com/NVIDIA/Model-Optimizer/blob/main/README.md"
modelopt_docs = "https://nvidia.github.io/Model-Optimizer/"
modelopt_megatron_bridge_readme = "https://github.com/NVIDIA/Model-Optimizer/blob/main/examples/megatron_bridge/README.md"
megatron_bridge_repo = "https://github.com/NVIDIA-NeMo/Megatron-Bridge"
megatron_bridge_docs = "https://docs.nvidia.com/nemo/megatron-bridge/latest/"
megatron_bridge_pruning_docs = "https://docs.nvidia.com/nemo/megatron-bridge/latest/training/pruning.html"
skills = ["skills/nemotron-customize/context/modelopt-optimization.txt"]
