# Generic PTQ quantization config for Megatron-Bridge + NVIDIA Model Optimizer.
#
# References:
# - Use Nemotron 3 Nano 30B for launch validation; larger checkpoints can be
#   supplied with args.hf_model_id when validating production scale.
# - FP8 targets Hopper/H100; NVFP4 targets Blackwell/B200.
# - Model Optimizer supports PTQ/QAT and mixed-precision recipes through the
#   Megatron-Bridge quantization scripts.
#
# Usage:
#   nemotron steps run optimize/modelopt/quantize -c default
#   nemotron steps run optimize/modelopt/quantize -c default args.export_quant_cfg=fp8
#
# Script arguments are forwarded from args: using hyphenated CLI flags. For
# example, args.hf_model_id becomes --hf-model-id. New upstream flags can be
# added directly under args: or passed literally through extra_args.

script:
  # Optional override for the upstream script path. Keep unset in normal containers.
  path: null
  flag_style: hyphen

args:
  # HuggingFace model id or local HF checkpoint path.
  hf_model_id: nvidia/NVIDIA-Nemotron-3-Nano-30B-A3B-Base-BF16

  # Trust custom model code from the HF repo/path.
  trust_remote_code: true

  # Quantization recipe. Match the choices accepted by the installed upstream
  # quantize.py: int8_sq, fp8, fp8_blockwise, int4_awq, w4a8_awq, or nvfp4.
  export_quant_cfg: fp8

  # Output Megatron distributed checkpoint path. Export to HF afterwards with
  # /opt/Megatron-Bridge/examples/quantization/export.py if deployment needs HF.
  megatron_save_path: ${oc.env:NEMO_RUN_DIR,${oc.env:PWD}/output}/optimize/quantize/super3-fp8

  # Parallelism. World size must be compatible with tp * pp and expert layout.
  # Nemotron Nano uses Mamba mixers whose ngroups must be divisible by tp; use
  # tp=8, pp=2 on the 16-GPU functional profile instead of tp=16.
  tp: 8        # tensor parallel size
  pp: 2        # pipeline parallel size
  ep: 8        # expert parallel size for MoE checkpoints
  etp: 1       # expert tensor parallel size

  # Calibration samples. PTQ guidance is typically 128-512 samples; NVFP4/QAD
  # workflows often use larger calibration sets such as 2K samples.
  calib_size: 512

  # Optional prompt/calibration input understood by upstream quantize.py. Leave
  # null to use the script default calibration dataset.
  prompts: null

  # Optional upstream boolean flags.
  compress: false
  weight_only: false
  export_kv_cache_quant: false
  disable_hf_datasets_file_lock: false

# Torchrun settings used by this thin wrapper.
torchrun:
  nproc_per_node: 8
  # nnodes: 1
  # node_rank: 0
  # master_addr: localhost
  # master_port: 29500

wandb_wrapper:
  # Upstream quantize.py does not expose W&B flags. This wrapper records
  # command/config/status so functional runs still show up in W&B.
  enabled: ${oc.decode:${oc.env:WANDB_ENABLED,false}}
  project: ${oc.env:WANDB_PROJECT,null}
  entity: ${oc.env:WANDB_ENTITY,null}
  name: ${oc.env:WANDB_NAME,null}
  job_type: modelopt-quantize

extra_args: []
