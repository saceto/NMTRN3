# Blackwell/B200 NVFP4 PTQ config. NVFP4 offers roughly 1.5-2.2x higher GEMM
# FLOPS than FP8 on Blackwell while reducing model memory footprint.

script:
  path: null
  flag_style: hyphen

args:
  hf_model_id: nvidia/NVIDIA-Nemotron-3-Nano-30B-A3B-Base-BF16
  trust_remote_code: true

  export_quant_cfg: nvfp4
  megatron_save_path: ${oc.env:NEMO_RUN_DIR,${oc.env:PWD}/output}/optimize/quantize/super3-nvfp4

  tp: 8
  pp: 2
  ep: 8
  etp: 1

  # Nemotron docs describe larger NVFP4 calibration/QAD inputs; keep this high for
  # quality-oriented runs and lower it for smoke tests.
  calib_size: 2000

torchrun:
  nproc_per_node: 16

extra_args: []
