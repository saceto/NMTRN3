defaults: default.yaml

run:
  env:
    nodes: 2
    gpus_per_node: 8
    nprocs_per_node: 8

args:
  megatron_save_path: ${oc.env:OPTIM_OUTPUT_DIR,${oc.env:PWD}/output}/quantize/tiny
  # Nemotron Nano's Mamba ngroups must be divisible by tensor parallel size.
  # Keep the 16-GPU launch shape as tp=8 x pp=2.
  tp: 8
  pp: 2
  ep: 8
  etp: 1
  calib_size: 8

torchrun:
  nproc_per_node: 8
