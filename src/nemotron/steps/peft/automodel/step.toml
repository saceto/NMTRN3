[step]
id = "peft/automodel"
name = "PEFT / LoRA Training (AutoModel)"
category = "peft"
description = """\
Parameter-efficient fine-tuning (LoRA) with the AutoModel stack. Same training
loop as sft/automodel but with a LoRA adapter wired in by default, making larger
HF backbones practical for adapter-based tuning."""
tags = ["peft", "lora", "fine-tuning", "automodel", "huggingface"]

[[consumes]]
type = "training_jsonl"
description = "Chat-format JSONL with messages."
required = true

[[produces]]
type = "checkpoint_lora"
description = "LoRA adapter weights (merge with base via convert/merge_lora to get a deployable HF checkpoint)."

[[models]]
name = "Qwen/Qwen3-30B-A3B"
description = "MoE HF backbone example for AutoModel LoRA tuning."
default = true
min_gpus = 8

[[models]]
name = "mistralai/Mistral-7B-Instruct-v0.3"
description = "Strong default for 1-2 GPU LoRA tuning."
min_gpus = 1

[[models]]
name = "meta-llama/Llama-3.1-8B-Instruct"
description = "Common HF baseline for single-node LoRA."
min_gpus = 2

[[parameters]]
name = "model.pretrained_model_name_or_path"
description = "HF base model used for adapter training. Record it with the adapter because merge requires the same base."

[[parameters]]
name = "dataset.path_or_dataset_id"
description = "Chat-format JSONL path or dataset id. This step consumes JSONL directly, not packed Parquet."

[[parameters]]
name = "peft.dim"
description = "LoRA rank. 8-32 is the typical range; raise for harder tasks."
default = 16

[[parameters]]
name = "peft.alpha"
description = "LoRA alpha; usually 2x dim works well."
default = 32

[[strategies]]
when = "Single-GPU or memory is tight"
then = "Keep dim low (8-16) and prefer Mistral-class models."

[[strategies]]
when = "Adapter is being merged for deployment"
then = "After training, run convert/merge_lora to fold the adapter into the base for a standalone HF checkpoint."

[[errors]]
name = "oom"
recovery = "Reduce dim, lower seq_length, or move to a smaller base model."

[[errors]]
name = "base_not_recorded_for_merge"
recovery = "Record model.pretrained_model_name_or_path, tokenizer, rank, alpha, and target modules with the adapter so convert/merge_lora can use the exact base."

[[errors]]
name = "packed_parquet_used_with_automodel"
recovery = "Use the source training_jsonl or switch to peft/megatron_bridge if packed Parquet and Megatron checkpoints are required."

[reference]
skill = "src/nemotron/steps/peft/automodel/README.md"
repo = "https://github.com/NVIDIA-NeMo/Automodel"
readme = "https://github.com/NVIDIA-NeMo/Automodel/blob/main/README.md"
docs = "https://docs.nvidia.com/nemo/automodel/latest/index.html"
finetune_peft_guide = "https://docs.nvidia.com/nemo/automodel/latest/guides/llm/finetune.html"
recipes_overview = "https://docs.nvidia.com/nemo/automodel/latest/guides/overview.html"
examples = "https://github.com/NVIDIA-NeMo/Automodel/tree/main/examples/llm_finetune"
script = "https://github.com/NVIDIA-NeMo/Automodel/blob/main/nemo_automodel/recipes/llm/train_ft.py"
