# Megatron-Bridge LoRA defaults. Same recipe as sft/megatron_bridge but with peft block enabled.
# Override the container's stale Megatron-Bridge with a branch that supports
# packed-parquet specs.
run:
  env:
    mounts:
      - ${auto_mount:git+https://github.com/NVIDIA/Megatron-LM.git@bbbedbb9f53343762e4dc70abc771b813a83d817,/opt/megatron-lm}
      - ${auto_mount:git+https://github.com/NVIDIA-NeMo/Megatron-Bridge.git@romeyn/parquet-sequence-pack,/opt/Megatron-Bridge}

recipe:
  _target_: megatron.bridge.recipes.nemotronh.nemotron_3_nano.nemotron_3_nano_finetune_config
  packed_sequence: true
  peft: lora
  seq_length: 4096

dataset:
  nano3_packed_sft_dir: ${oc.env:SFT_PACKED_DIR}
  seq_length: 4096
  packed_sequence_specs:
    packed_sequence_size: 4096

train:
  train_iters: 1000
  global_batch_size: 4

model:
  seq_length: 4096
  tensor_model_parallel_size: 4
  pipeline_model_parallel_size: 1
  context_parallel_size: 1

# LoRA adapter spec applied via megatron.bridge.recipes.utils.finetune_utils.default_peft_config
peft:
  type: lora
  dim: 32
  alpha: 32
  dropout: 0.0
  target_modules:
    - linear_qkv
    - linear_proj

# PEFT validation in Megatron-Bridge requires checkpoint.pretrained_checkpoint
# to remain populated even when AutoBridge loads HF weights into the provider.
hf_load:
  clear_pretrained_checkpoint: false
  inherit_save_as_load: false

checkpoint_patch:
  # Megatron-Core's torch_dist strategy uses multiprocessing.Manager().Queue()
  # inside filesystem_async.py even for synchronous saves. On some remote
  # filesystems this can die with EOFError while saving PEFT adapter checkpoints.
  # Use a plain spawn-context Queue for the same rank-local write-result handoff.
  use_spawn_queue_for_torch_dist: true

logger:
  log_interval: 10
  wandb_project: ${oc.env:WANDB_PROJECT,null}
  wandb_entity: ${oc.env:WANDB_ENTITY,null}
  wandb_exp_name: ${oc.env:WANDB_NAME,peft-megatron-bridge}

checkpoint:
  save: /nemo_run/peft-model
  save_interval: 50
  pretrained_checkpoint: ${oc.env:NEMOTRON_PRETRAINED_CKPT}
  finetune: true
  # PEFT saves adapter-filtered checkpoint sections. The fully-parallel
  # distributed checkpoint writer is fragile for that sparse adapter-only state,
  # so use the plain torch_dist writer and save only the adapter artifact.
  fully_parallel_save: false
  async_save: false
  save_optim: false
  save_rng: false
