defaults: default.yaml

hf_model_path: nvidia/NVIDIA-Nemotron-3-Nano-30B-A3B-BF16
trust_remote_code: true
load_hf_weights: false

run:
  env:
    container_image: nvcr.io/nvidia/nemo:25.11.nemotron_3_nano
    nodes: 2
    gpus_per_node: 8
    nprocs_per_node: 8
    # Override the container's Megatron-Bridge only for the tiny nano3 smoke path.
    mounts:
      - ${auto_mount:git+https://github.com/NVIDIA/Megatron-LM.git@bbbedbb9f53343762e4dc70abc771b813a83d817,/opt/megatron-lm}
      - ${auto_mount:git+https://github.com/NVIDIA-NeMo/Megatron-Bridge.git@romeyn/parquet-sequence-pack,/opt/Megatron-Bridge}

recipe:
  _target_: megatron.bridge.recipes.nemotronh.nemotron_3_nano.nemotron_3_nano_finetune_config
  packed_sequence: true
  peft: lora
  seq_length: 4096

dataset:
  packed_sequence_specs:
    packed_sequence_size: 4096
    packed_train_data_path: ${oc.env:SFT_PACKED_DIR,./output/data_prep/sft_packing/tiny/splits/train/*.parquet}

train:
  train_iters: 5
  global_batch_size: 8
  micro_batch_size: 1

scheduler:
  lr_warmup_iters: 1

logger:
  log_interval: 1
  wandb_exp_name: ${oc.env:WANDB_NAME,peft-megatron-bridge-tiny}
model:
  seq_length: 4096
  tensor_model_parallel_size: 4
  pipeline_model_parallel_size: 1
  context_parallel_size: 1
  expert_model_parallel_size: 8
  expert_tensor_parallel_size: 1
  sequence_parallel: true
  calculate_per_token_loss: true
  recompute_granularity: full
  recompute_method: uniform
  recompute_num_layers: 1

checkpoint:
  save: ${oc.env:SFT_OUTPUT_DIR,./output/peft-megatron-bridge-tiny}
  save_interval: 5
  async_save: false
  fully_parallel_save: false
  save_optim: false
  save_rng: false
  # Required Megatron checkpoint to freeze and adapt (any base/instruct/SFT'd model or a
  # convert/hf_to_megatron result; PEFT cannot load directly from HF). Set
  # MEGATRON_PRETRAIN_PATH, or pass checkpoint.pretrained_checkpoint=/path on the CLI.
  pretrained_checkpoint: ${oc.env:MEGATRON_PRETRAIN_PATH,null}
