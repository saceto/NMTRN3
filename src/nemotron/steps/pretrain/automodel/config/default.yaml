# AutoModel pretraining defaults.
# Uses the Qwen3-30B-A3B MoE model for continued pretraining.

recipe: TrainPretrainRecipeForNextTokenPrediction

step_scheduler:
  global_batch_size: 64
  local_batch_size: 1
  ckpt_every_steps: 500
  val_every_steps: 500
  max_steps: 10000

dist_env:
  backend: nccl
  timeout_minutes: 60

rng:
  _target_: nemo_automodel.components.training.rng.StatefulRNG
  seed: 1234
  ranked: true

model:
  _target_: nemo_automodel.NeMoAutoModelForCausalLM.from_pretrained
  pretrained_model_name_or_path: Qwen/Qwen3-30B-A3B
  trust_remote_code: true
  torch_dtype: bfloat16
  backend:
    _target_: nemo_automodel.components.models.common.BackendConfig
    attn: te
    linear: torch
    rms_norm: torch_fp32
    experts: torch_mm
    dispatcher: torch
    fake_balanced_gate: false
    enable_hf_state_dict_adapter: true
    enable_fsdp_optimizations: true

# Set load_weights=false for from-scratch pretraining.
load_weights: true

distributed:
  _target_: nemo_automodel.components.distributed.config.FSDP2Config
  dp_size: none
  tp_size: 1
  cp_size: 1
  pp_size: 1
  ep_size: 8
  sequence_parallel: false
  activation_checkpointing: false

checkpoint:
  enabled: true
  checkpoint_dir: ./checkpoints/pretrain
  model_save_format: safetensors
  save_consolidated: true

loss_fn:
  _target_: nemo_automodel.components.loss.masked_ce.MaskedCrossEntropy

# Pretraining consumes Megatron bin/idx tokenized data via AutoModel's
# MegatronPretraining wrapper.
dataset:
  _target_: nemo_automodel.components.datasets.llm.megatron_dataset.MegatronPretraining
  paths: ${oc.env:PRETRAIN_BLEND_PATH}
  index_mapping_dir: ./index_mapping/train
  tokenizer:
    _target_: nemo_automodel._transformers.auto_tokenizer.NeMoAutoTokenizer.from_pretrained
    pretrained_model_name_or_path: Qwen/Qwen3-30B-A3B
  seq_length: 4096
  split: "0.99, 0.01, 0.00"
  splits_to_build: train

validation_dataset:
  _target_: nemo_automodel.components.datasets.llm.megatron_dataset.MegatronPretraining
  paths: ${oc.env:PRETRAIN_BLEND_PATH}
  index_mapping_dir: ./index_mapping/validation
  tokenizer:
    _target_: nemo_automodel._transformers.auto_tokenizer.NeMoAutoTokenizer.from_pretrained
    pretrained_model_name_or_path: Qwen/Qwen3-30B-A3B
  seq_length: 4096
  split: "0.99, 0.01, 0.00"
  splits_to_build: validation
  num_val_samples: 1024

dataloader:
  _target_: torchdata.stateful_dataloader.StatefulDataLoader
  collate_fn: torch.utils.data.default_collate
  shuffle: false

validation_dataloader:
  _target_: torchdata.stateful_dataloader.StatefulDataLoader
  collate_fn: torch.utils.data.default_collate

optimizer:
  _target_: torch.optim.AdamW
  betas: [0.9, 0.95]
  eps: 1e-8
  lr: 3.0e-4
  weight_decay: 0.1

lr_scheduler:
  lr_decay_style: cosine
  min_lr: 3.0e-5

wandb:
  project: ${oc.env:WANDB_PROJECT,null}
  entity: ${oc.env:WANDB_ENTITY,null}
  name: ${oc.env:WANDB_NAME,pretrain-automodel}
