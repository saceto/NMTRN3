defaults: default.yaml

run:
  env:
    nodes: 2
    gpus_per_node: 8
    nprocs_per_node: 8

step_scheduler:
  global_batch_size: 16
  local_batch_size: 1
  ckpt_every_steps: 5
  val_every_steps: 5
  max_steps: 5

checkpoint:
  checkpoint_dir: ${oc.env:PRETRAIN_OUTPUT_DIR,./output/pretrain-automodel-tiny}/checkpoints

dataset:
  paths: ${oc.env:PRETRAIN_BLEND_PATH,./output/data_prep/pretrain_prep/tiny/blend.json}
  index_mapping_dir: ${oc.env:PRETRAIN_OUTPUT_DIR,./output/pretrain-automodel-tiny}/index_mapping/train
  seq_length: 1024
  num_train_samples: 128
  trainer_max_steps: 5

validation_dataset:
  paths: ${oc.env:PRETRAIN_BLEND_PATH,./output/data_prep/pretrain_prep/tiny/blend.json}
  index_mapping_dir: ${oc.env:PRETRAIN_OUTPUT_DIR,./output/pretrain-automodel-tiny}/index_mapping/validation
  seq_length: 1024
  num_val_samples: 16

wandb:
  name: ${oc.env:WANDB_NAME,pretrain-automodel-tiny}
