# Megatron-Bridge pretrain / CPT defaults. Adapted from speaker/configs/cpt/megatron.

run:
  env:
    container_image: nvcr.io/nvidia/nemo:26.04

mode: cpt

# Base init priority: resume > pretrained_checkpoint > HF.
# Default: load base weights from HuggingFace via AutoBridge for a fresh CPT start.
# To continue CPT from a Megatron checkpoint instead, uncomment pretrained_checkpoint
# in the checkpoint block below. To resume, see the checkpoint block.
hf_model_path: nvidia/NVIDIA-Nemotron-3-Nano-30B-A3B-BF16
load_hf_weights: true
trust_remote_code: true

recipe:
  _target_: megatron.bridge.recipes.nemotronh.nemotron_3_nano.nemotron_3_nano_pretrain_config
  seq_length: 8192
  tensor_model_parallel_size: 4
  pipeline_model_parallel_size: 1
  context_parallelism: 1
  sequence_parallelism: true

dataset:
  data_paths: ${oc.env:PRETRAIN_BLEND_PATH}
  seq_length: 8192
  reset_attention_mask: false
  reset_position_ids: false
  eod_mask_loss: false
  data_sharding: true

train:
  train_iters: 20000
  global_batch_size: 64

optimizer:
  lr: 3.0e-4
  min_lr: 3.0e-5
  weight_decay: 0.1

scheduler:
  lr_warmup_iters: 500
  lr_decay_style: cosine

logger:
  log_interval: 10
  wandb_project: ${oc.select:run.wandb.project,${oc.env:WANDB_PROJECT,null}}
  wandb_entity: ${oc.select:run.wandb.entity,${oc.env:WANDB_ENTITY,null}}
  wandb_exp_name: ${oc.env:WANDB_NAME,pretrain-megatron-bridge}
checkpoint:
  # Where checkpoints are written.
  save: /nemo_run/pretrain-model

  # Continue CPT from a Megatron checkpoint instead of HF: uncomment to start from it.
  # When set it takes priority over the HF base above; if set but not a real
  # checkpoint the run fails fast (it does not silently fall back to HF).
  # pretrained_checkpoint: ${oc.env:MEGATRON_PRETRAIN_PATH,null}

  # Resume an interrupted run: point `load` at a checkpoint directory. It defaults
  # to `save`, so re-running with the same `save` already auto-resumes. Megatron-Bridge
  # reads the tracker file in that dir, finds the latest iteration, and loads its
  # `iter_<N>/` subdir (optimizer + RNG included). Uncomment to set it explicitly:
  # load: /nemo_run/pretrain-model

  # By default the latest iteration is loaded. To resume from a specific iteration
  # instead, set ckpt_step to N and it loads that `iter_<N>/`. Uncomment to use:
  # ckpt_step: 1000

  save_interval: 500
  finetune: false
