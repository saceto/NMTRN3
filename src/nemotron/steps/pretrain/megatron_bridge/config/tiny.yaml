defaults: default.yaml

run:
  env:
    nodes: 2
    gpus_per_node: 8
    nprocs_per_node: 8
    env_vars:
      UB_SKIPMC: "1"

recipe:
  seq_length: 4096

model:
  seq_length: 4096
  tensor_model_parallel_size: 4
  pipeline_model_parallel_size: 1
  context_parallel_size: 1
  expert_model_parallel_size: 8
  expert_tensor_parallel_size: 1
  sequence_parallel: true
  recompute_granularity: full
  recompute_method: uniform
  recompute_num_layers: 1

dataset:
  data_paths: ${oc.env:PRETRAIN_BLEND_PATH,/mnt/lustre-shared/output/functional/prep/pretrain_idxbin/tiny/blend.json}
  seq_length: 4096

train:
  train_iters: 5
  global_batch_size: 16
  micro_batch_size: 1

scheduler:
  lr_warmup_iters: 1

logger:
  log_interval: 1
  wandb_exp_name: ${oc.env:WANDB_NAME,pretrain-megatron-bridge-tiny}

checkpoint:
  save: ${oc.env:PRETRAIN_OUTPUT_DIR,./output/pretrain-megatron-bridge-tiny}
  save_interval: 5
