# NeMo-RL DPO defaults. Mirrors speaker/configs/dpo/config.yaml — knobs, not internals.

run:
  env:
    container_image: nvcr.io/nvidia/nemo-rl:v0.6.0

dpo:
  max_num_epochs: 1
  max_num_steps: 500
  val_period: 50
  val_batches: 8
  val_global_batch_size: 8
  val_micro_batch_size: 1
  val_at_start: true
  val_at_end: true
  seed: 42

  reference_policy_kl_penalty: 0.05
  preference_average_log_probs: false
  sft_average_log_probs: ${.preference_average_log_probs}
  preference_loss_weight: 1
  sft_loss_weight: 0

policy:
  model_name: ${oc.env:RL_POLICY_MODEL,meta-llama/Llama-3.2-1B-Instruct}
  tokenizer:
    name: ${policy.model_name}
  train_global_batch_size: 32
  train_micro_batch_size: 1
  max_total_sequence_length: 4096
  precision: bfloat16
  offload_optimizer_for_logprob: false
  optimizer:
    name: adamw
    lr: 5.0e-7
    weight_decay: 0.01
  scheduler:
    name: cosine
    warmup_steps: 50

# NeMo-RL preference dataset. Newer NeMo-RL versions expect dataset-specific
# fields under train/validation, with shared defaults under default.
data:
  max_input_seq_length: ${policy.max_total_sequence_length}
  shuffle: true
  num_workers: 1
  train:
    split: train
  validation:
    split: validation
  default:
    dataset_name: HelpSteer3
    prompt_file: null
    system_prompt_file: null

checkpointing:
  enabled: true
  checkpoint_dir: /nemo_run/dpo-checkpoints
  metric_name: val:validation-default_loss
  higher_is_better: false
  save_optimizer: false

logger:
  log_dir: /nemo_run/dpo-logs
  wandb_enabled: ${oc.decode:${oc.env:WANDB_ENABLED,false}}
  tensorboard_enabled: false
  mlflow_enabled: false
  swanlab_enabled: false
  monitor_gpus: true
  num_val_samples_to_print: 0
  wandb:
    project: ${oc.select:run.wandb.project,${oc.env:WANDB_PROJECT,null}}
    entity: ${oc.select:run.wandb.entity,${oc.env:WANDB_ENTITY,null}}
    name: ${oc.env:WANDB_NAME,rl-nemo-rl-dpo}