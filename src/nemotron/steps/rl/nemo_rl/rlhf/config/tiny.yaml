defaults: default.yaml

checkpointing:
  checkpoint_dir: ${oc.env:RL_OUTPUT_DIR,./output/rl}/rlhf-tiny-checkpoints
  save_period: 5
  keep_top_k: 1
  save_optimizer: false

grpo:
  num_prompts_per_step: 4
  num_generations_per_prompt: 2
  num_val_generations_per_prompt: 1
  max_num_steps: 5
  val_period: 5
  val_batch_size: null
  dynamic_sampling_max_gen_batches: 2

policy:
  model_name: meta-llama/Llama-3.2-1B-Instruct
  tokenizer:
    name: ${policy.model_name}
    chat_template_kwargs: null
  train_global_batch_size: 8
  train_micro_batch_size: 1
  generation_batch_size: 2
  max_total_sequence_length: 2048
  logprob_chunk_size: 512
  scheduler:
    - name: torch.optim.lr_scheduler.LinearLR
      kwargs:
        start_factor: 0.1
        end_factor: 1.0
        total_iters: 2
    - name: torch.optim.lr_scheduler.ConstantLR
      kwargs:
        factor: 1.0
        total_iters: 10000000
    - milestones: [2]
  generation:
    max_new_tokens: 256
    vllm_cfg:
      async_engine: false
      max_model_len: ${policy.max_total_sequence_length}
      enforce_eager: true
      gpu_memory_utilization: 0.65
    colocated:
      resources:
        gpus_per_node: 8
        num_nodes: 1

data:
  manifest_path: ${oc.env:RL_PREP_MANIFEST,./output/data_prep/rl_prep/tiny/manifest.json}
  allow_train_as_validation: true

env:
  nemo_gym:
    num_gpu_nodes: 1
    genrm_model_name: ${oc.env:RL_REWARD_MODEL,Qwen/Qwen2.5-3B-Instruct}
    genrm_compare:
      resources_servers:
        genrm_compare:
          genrm_responses_create_params:
            max_output_tokens: 128
    genrm_model:
      responses_api_models:
        genrm_model:
          model: ${oc.env:RL_REWARD_MODEL,Qwen/Qwen2.5-3B-Instruct}
          vllm_serve_kwargs:
            data_parallel_size: 1
            tensor_parallel_size: 1
            pipeline_parallel_size: 1
            trust_remote_code: true
            max_num_seqs: 1
            max_model_len: 1024
            gpu_memory_utilization: 0.35
            enforce_eager: true
            compilation_config:
              cudagraph_capture_sizes: [1]

logger:
  log_dir: ${oc.env:RL_OUTPUT_DIR,./output/rl}/rlhf-tiny-logs
  wandb:
    name: ${oc.env:WANDB_NAME,rl-nemo-rl-rlhf-tiny}
cluster:
  gpus_per_node: 8
  num_nodes: 1
