# Generic NeMo-Gym RLVR via GRPO.
#
# Use this when rewards are provided by NeMo-Gym resource servers rather than
# the upstream math-only GRPO example. The JSONL should contain NeMo-Gym records
# consumable by nemo_gym_example_to_nemo_rl_datum_spec.

run:
  env:
    container: nvcr.io/nvidia/nemo-rl:v0.6.0
    persistent_cache: ""
    env_vars:
      NRL_WG_USE_RAY_REF: "1"
      NRL_VLLM_USE_V1: "1"
      NRL_IGNORE_VERSION_MISMATCH: "1"
      NRL_FORCE_REBUILD_VENVS: "false"
      VLLM_ATTENTION_BACKEND: FLASH_ATTN
      VLLM_USE_PRECOMPILED: "1"
      VLLM_DEEP_GEMM_WARMUP: skip
      RAY_DEDUP_LOGS: "1"
      RAY_ENABLE_UV_RUN_RUNTIME_ENV: "0"
      UV_HTTP_TIMEOUT: "10"
      OMP_NUM_THREADS: "16"
      NEMO_GYM_VENV_DIR: /opt/gym_venvs

checkpointing:
  enabled: true
  checkpoint_dir: /nemo_run/rlvr-nemo-gym-checkpoints
  metric_name: val:total_reward/mean
  higher_is_better: true
  keep_top_k: 3
  save_period: 25
  checkpoint_must_save_by: null
  model_save_format: safetensors
  save_consolidated: false
  save_optimizer: false

grpo:
  num_prompts_per_step: 16
  num_generations_per_prompt: 8
  num_val_generations_per_prompt: 2
  max_rollout_turns: 1
  max_num_epochs: 1
  max_num_steps: 500
  normalize_rewards: true
  use_leave_one_out_baseline: true
  advantage_clip_low: -50
  advantage_clip_high: 50
  val_period: 25
  val_at_start: false
  val_at_end: false
  overlong_filtering: false
  max_val_samples: null
  val_batch_size: null
  seed: 42
  use_dynamic_sampling: false
  dynamic_sampling_max_gen_batches: 10
  batch_multiplier: 1
  penalize_invalid_tool_call: true
  invalid_tool_call_advantage: -5.0
  penalize_malformed_thinking: true
  malformed_thinking_advantage: -5.0
  reward_shaping:
    enabled: false
    overlong_buffer_length: 128
    overlong_buffer_penalty: 1
    max_response_length: ${policy.max_total_sequence_length}
    stop_properly_penalty_coef: null
  reward_scaling:
    enabled: false
    source_min: 0.0
    source_max: 1.0
    target_min: 0.0
    target_max: 1.0
  async_grpo:
    enabled: false
    max_trajectory_age_steps: 1
    in_flight_weight_updates: true
    recompute_kv_cache_after_weight_updates: false
  use_best_at_k: false
  best_at_k_k: 8
  best_at_k_m: 1000
  use_combined_training: false
  combined_training_weight_mode: auto
  combined_training_best_at_k_weight: 0.2
  combined_training_pass_at_1_weight: 1.0
  dynamic_sampling_oversample_ratio: 1.0
  seq_logprob_error_threshold: 2

loss_fn:
  reference_policy_kl_penalty: 0.0
  reference_policy_kl_type: k3
  kl_input_clamp_value: null
  kl_output_clamp_value: null
  ratio_clip_min: 0.2
  ratio_clip_max: 0.28
  ratio_clip_c: null
  use_on_policy_kl_approximation: true
  use_importance_sampling_correction: true
  truncated_importance_sampling_ratio: 5
  truncated_importance_sampling_ratio_min: null
  truncated_importance_sampling_type: tis
  sequence_level_importance_ratios: false
  token_level_loss: true
  force_on_policy_ratio: true
  use_kl_in_reward: false

policy:
  model_name: ${oc.env:RL_POLICY_MODEL,meta-llama/Llama-3.2-1B-Instruct}
  tokenizer:
    name: ${policy.model_name}
    chat_template_kwargs: null
  hf_config_overrides: {}
  train_global_batch_size: 32
  train_micro_batch_size: 1
  generation_batch_size: 8
  logprob_batch_size: 1
  max_total_sequence_length: 4096
  precision: bfloat16
  logprob_chunk_size: 1024
  offload_optimizer_for_logprob: false
  dtensor_cfg:
    _v2: true
    enabled: true
    env_vars:
      PYTORCH_CUDA_ALLOC_CONF: ""
    cpu_offload: false
    sequence_parallel: false
    activation_checkpointing: false
    tensor_parallel_size: 1
    context_parallel_size: 1
    custom_parallel_plan: null
    clear_cache_every_n_steps: null
  megatron_cfg:
    enabled: false
  dynamic_batching:
    enabled: false
  sequence_packing:
    enabled: false
  draft:
    enabled: false
  make_sequence_length_divisible_by: ${policy.dtensor_cfg.tensor_parallel_size}
  max_grad_norm: 1.0
  optimizer:
    name: torch.optim.AdamW
    kwargs:
      lr: 1.0e-6
      weight_decay: 0.0
      betas: [0.9, 0.999]
      eps: 1e-8
      foreach: false
      fused: false
  scheduler:
    - name: torch.optim.lr_scheduler.LinearLR
      kwargs:
        start_factor: 0.1
        end_factor: 1.0
        total_iters: 10
    - name: torch.optim.lr_scheduler.ConstantLR
      kwargs:
        factor: 1.0
        total_iters: 10000000
    - milestones: [10]
  generation:
    port_range_low: 11001
    port_range_high: 15000
    backend: vllm
    max_new_tokens: 1024
    temperature: 1.0
    top_p: 1.0
    top_k: null
    stop_token_ids: null
    stop_strings: null
    vllm_cfg:
      async_engine: false
      precision: ${policy.precision}
      kv_cache_dtype: auto
      tensor_parallel_size: 1
      pipeline_parallel_size: 1
      expert_parallel_size: 1
      gpu_memory_utilization: 0.8
      max_model_len: ${policy.max_total_sequence_length}
      enforce_eager: true
      use_deep_gemm: false
      num_last_layers_in_bf16: 0
      num_first_layers_in_bf16: 0
      enable_vllm_metrics_logger: true
      vllm_metrics_logger_interval: 0.5
      expose_http_server: true
      skip_tokenizer_init: false
      http_server_serving_chat_kwargs:
        enable_auto_tools: true
        tool_parser: hermes
        reasoning_parser: null
    vllm_kwargs: {}
    colocated:
      enabled: true
      resources:
        gpus_per_node: 8
        num_nodes: 1

data:
  max_input_seq_length: null
  shuffle: true
  num_workers: 0
  use_multiple_dataloader: false
  default_agent_ref:
    type: responses_api_agents
    name: math_with_judge_simple_agent
  train:
    data_path: /path/to/nemo_gym/train.jsonl
  validation:
    data_path: /path/to/nemo_gym/val.jsonl
  default:
    dataset_name: NemoGymDataset
    env_name: nemo_gym
    prompt_file: null
    system_prompt_file: null
    processor: nemo_gym_data_processor

env:
  should_use_nemo_gym: true
  should_log_nemo_gym_responses: true
  nemo_gym:
    rollout_max_attempts_to_avoid_lp_nan: 1
    is_trajectory_collection: false
    skip_venv_if_present: true
    num_gpu_nodes: 0
    port_range_low: 15001
    port_range_high: 20000
    invalid_tool_call_patterns:
      - "<tool_call>"
      - "</tool_call>"
      - "<function_call>"
      - "</function_call>"
    thinking_tags:
      - "<think>"
      - "</think>"
    config_paths:
      - responses_api_models/vllm_model/configs/vllm_model_for_training.yaml
      - resources_servers/math_with_judge/configs/math_with_judge.yaml
      - resources_servers/code_gen/configs/code_gen.yaml
      - resources_servers/single_step_tool_use_with_argument_comparison/configs/single_step_tool_use_with_argument_comparison.yaml
    policy_model:
      responses_api_models:
        vllm_model:
          uses_reasoning_parser: false
          extra_body:
            chat_template_kwargs:
              enable_thinking: false
    math_with_judge:
      resources_servers:
        math_with_judge:
          judge_model_server:
            name: policy_model
          should_use_judge: false
    code_gen:
      resources_servers:
        code_gen:
          num_processes: 8
          unit_test_timeout_secs: 10
          debug: false

logger:
  log_dir: /nemo_run/rlvr-nemo-gym-logs
  num_val_samples_to_print: 0
  wandb_enabled: ${oc.decode:${oc.env:WANDB_ENABLED,false}}
  tensorboard_enabled: false
  mlflow_enabled: false
  swanlab_enabled: false
  monitor_gpus: true
  wandb:
    project: ${oc.env:WANDB_PROJECT,nemotron-rlvr-dev}
    entity: ${oc.env:WANDB_ENTITY,null}
    name: ${oc.env:WANDB_NAME,rlvr-nemo-gym}
  tensorboard:
    log_dir: tb_logs-rlvr-nemo-gym
  mlflow:
    experiment_name: rlvr-nemo-gym
    run_name: rlvr-nemo-gym
  gpu_monitoring:
    collection_interval: 10
    flush_interval: 10

cluster:
  gpus_per_node: 8
  num_nodes: 1
