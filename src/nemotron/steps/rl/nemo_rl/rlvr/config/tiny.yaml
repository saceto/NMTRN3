defaults: default.yaml

grpo:
  num_prompts_per_step: 8
  num_generations_per_prompt: 2
  max_num_steps: 5
  val_period: 5
  max_val_samples: 16
  val_batch_size: 16

policy:
  model_name: meta-llama/Llama-3.2-1B-Instruct
  tokenizer:
    name: ${policy.model_name}
  train_global_batch_size: 16
  train_micro_batch_size: 1
  generation_batch_size: 16
  logprob_batch_size: 1
  max_total_sequence_length: 2048
  generation:
    max_new_tokens: 256

checkpointing:
  checkpoint_dir: ${oc.env:RL_OUTPUT_DIR,./output/rl}/rlvr-tiny-checkpoints

logger:
  log_dir: ${oc.env:RL_OUTPUT_DIR,./output/rl}/rlvr-tiny-logs
  wandb:
    name: ${oc.env:WANDB_NAME,rl-nemo-rl-rlvr-tiny}
cluster:
  gpus_per_node: 8
  num_nodes: 2
