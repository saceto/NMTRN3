defaults: default.yaml

run:
  env:
    nodes: 2
    gpus_per_node: 8
    nprocs_per_node: 8

step_scheduler:
  global_batch_size: 16
  local_batch_size: 1
  ckpt_every_steps: 5
  val_every_steps: 5
  max_steps: 5

checkpoint:
  checkpoint_dir: ${oc.env:SFT_OUTPUT_DIR,./output/automodel-tiny}/checkpoints

dataset:
  path_or_dataset_id: HuggingFaceH4/ultrachat_200k
  split: train_sft[:64]

validation_dataset:
  path_or_dataset_id: HuggingFaceH4/ultrachat_200k
  split: test_sft[:16]

wandb:
  name: ${oc.env:WANDB_NAME,sft-automodel-tiny}