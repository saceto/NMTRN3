[step]
id = "sft/automodel"
name = "SFT Training (AutoModel)"
category = "sft"
description = """\
Supervised fine-tuning with the AutoModel stack for HF-format models and JSONL
datasets that already use OpenAI chat-format messages. Supports full SFT and
LoRA-style adapter tuning from the same step."""
tags = ["sft", "fine-tuning", "automodel", "huggingface", "peft"]

[[consumes]]
type = "training_jsonl"
description = "Instruction data in JSONL with a messages field"
required = true

[[produces]]
type = "checkpoint_hf"
description = "HuggingFace checkpoint directory (full model or adapter-style PEFT output)"

[[models]]
name = "Qwen/Qwen3-30B-A3B"
description = "MoE HF backbone example for AutoModel SFT and LoRA-style runs."
default = true
min_gpus = 8

[[models]]
name = "mistralai/Mistral-7B-Instruct-v0.3"
description = "Good default when GPU count is small and iteration speed matters."
min_gpus = 2

[[models]]
name = "meta-llama/Llama-3.1-8B-Instruct"
description = "Common HF baseline for single-node SFT and LoRA."
min_gpus = 4

[[parameters]]
name = "model.pretrained_model_name_or_path"
description = "HF base model or checkpoint used for full SFT or LoRA-style AutoModel tuning."

[[parameters]]
name = "dataset.path_or_dataset_id"
description = "Chat-format JSONL path or dataset id. AutoModel reads training_jsonl directly; do not point this at packed Parquet."

[[parameters]]
name = "peft"
description = "Use 'lora' for adapter tuning, or 'null' for full fine-tuning."
default = "null"
choices = ["lora", "null"]

[[parameters]]
name = "dataloader.collate_fn"
description = "Chat dataset collater. Use the AutoModel default_collater unless the dataset was pre-tokenized deliberately."
default = "nemo_automodel.components.datasets.utils.default_collater"

[[strategies]]
when = "1-2 GPUs or memory is tight"
then = "prefer peft=lora and start with a Mistral-class model"

[[strategies]]
when = "3-4 GPUs and the model fits comfortably"
then = "consider full fine-tuning only if checkpoint size and iteration speed are acceptable"
skill = "Automodel/docs/guides/llm/finetune.md"

[[strategies]]
when = "dataset already uses OpenAI chat-format JSONL"
then = "skip data_prep/sft_packing and train directly from training_jsonl"
skill = "Automodel/docs/guides/dataset-overview.md"

[[strategies]]
when = "you need an immediately deployable HF checkpoint"
then = "save safetensors checkpoints and prefer the consolidated HF output layout"
skill = "Automodel/docs/guides/checkpointing.md"

[[errors]]
name = "chat_template_missing"
recovery = "use a tokenizer with chat-template support, or convert the data to prompt/completion format before training"

[[errors]]
name = "oom"
recovery = "switch to peft=lora, reduce batch size, or move to a smaller model"

[[errors]]
name = "packed_parquet_used_with_automodel"
recovery = "Use training_jsonl directly. If the only data artifact is packed_parquet, go back to the source JSONL or choose sft/megatron_bridge."

[reference]
skill = "src/nemotron/steps/sft/automodel/README.md"
repo = "https://github.com/NVIDIA-NeMo/Automodel"
readme = "https://github.com/NVIDIA-NeMo/Automodel/blob/main/README.md"
docs = "https://docs.nvidia.com/nemo/automodel/latest/index.html"
finetune_guide = "https://docs.nvidia.com/nemo/automodel/latest/guides/llm/finetune.html"
recipes_overview = "https://docs.nvidia.com/nemo/automodel/latest/guides/overview.html"
examples = "https://github.com/NVIDIA-NeMo/Automodel/tree/main/examples/llm_finetune"
script = "https://github.com/NVIDIA-NeMo/Automodel/blob/main/nemo_automodel/recipes/llm/train_ft.py"
config = "https://github.com/NVIDIA-NeMo/Automodel/blob/main/examples/llm_finetune/llama3_1/llama3_1_8b_columnmapped_lora.yaml"
