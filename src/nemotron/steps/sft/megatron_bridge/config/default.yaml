# Tiny SFT for a remote cluster profile, for example `--run YOUR-CLUSTER`.
# Pulls base weights from HuggingFace via AutoBridge so no pre-existing
# Megatron checkpoint is required. Uses the packed_parquet shards produced by
# `nemotron steps run data_prep/sft_packing -c tiny --run YOUR-CLUSTER`.
#
# Note: dataset paths are explicit (Megatron-Bridge's vanilla schema). This
# step is generic — recipe-specific dir shortcuts live in recipes/, not here.

run:
  env:
    container_image: nvcr.io/nvidia/nemo:26.04

# Base init priority: resume > pretrained_checkpoint > HF.
# Default: load base weights from HuggingFace via AutoBridge (no Megatron base needed).
# To start from a Megatron checkpoint instead, uncomment pretrained_checkpoint in the
# checkpoint block below. To resume, see the checkpoint block.
hf_model_path: nvidia/NVIDIA-Nemotron-3-Nano-30B-A3B-BF16
trust_remote_code: true
load_hf_weights: true

recipe:
  _target_: megatron.bridge.recipes.nemotronh.nemotron_3_nano.nemotron_3_nano_sft_config
  packed_sequence: true
  seq_length: 4096

dataset:
  seq_length: 4096
  packed_sequence_specs:
    packed_sequence_size: 4096
    packed_train_data_path: ${oc.env:SFT_PACKED_DIR,./output/data_prep/sft_packing/tiny/splits/train}
    # No validation shards from sample=1000 run; uncomment when valid/ exists.
    # packed_val_data_path: ${oc.env:SFT_PACKED_VAL_DIR,./output/data_prep/sft_packing/tiny/splits/valid}

train:
  train_iters: 10
  # 16 GPUs / TP=4 => DP=4; micro=1, so global must be a multiple of 4.
  global_batch_size: 8
  micro_batch_size: 1

model:
  seq_length: 4096
  tensor_model_parallel_size: 4
  pipeline_model_parallel_size: 1
  context_parallel_size: 1
  expert_model_parallel_size: 8
  expert_tensor_parallel_size: 1
  sequence_parallel: true
  # Required by Megatron-Bridge whenever CP > 1 is anywhere in the pipeline.
  calculate_per_token_loss: true
  # Activation recomputation to keep peak memory in check at seq_length=4096.
  recompute_granularity: full
  recompute_method: uniform
  recompute_num_layers: 1

scheduler:
  lr_warmup_iters: 2

logger:
  log_interval: 1
  wandb_project: ${oc.select:run.wandb.project,${oc.env:WANDB_PROJECT,null}}
  wandb_entity: ${oc.select:run.wandb.entity,${oc.env:WANDB_ENTITY,null}}
  wandb_exp_name: ${oc.env:WANDB_NAME,sft-megatron-bridge}

checkpoint:
  # Where checkpoints are written.
  save: ${oc.env:SFT_OUTPUT_DIR}/sft-tiny-2node

  # Base from a Megatron checkpoint instead of HF: uncomment to finetune from it.
  # When set it takes priority over the HF base above; if set but not a real
  # checkpoint the run fails fast (it does not silently fall back to HF).
  # pretrained_checkpoint: ${oc.env:MEGATRON_PRETRAIN_PATH,null}

  # Resume an interrupted run: point `load` at a checkpoint directory. It defaults
  # to `save`, so re-running with the same `save` already auto-resumes. Megatron-Bridge
  # reads the tracker file in that dir, finds the latest iteration, and loads its
  # `iter_<N>/` subdir (optimizer + RNG included). Uncomment to set it explicitly:
  # load: ${oc.env:SFT_OUTPUT_DIR}/sft-tiny-2node

  # By default the latest iteration is loaded. To resume from a specific iteration
  # instead, set ckpt_step to N and it loads that `iter_<N>/`. Uncomment to use:
  # ckpt_step: 100

  save_interval: 5
  finetune: true
