# Tiny SFT for the 2-node slurm_sft profile.
# Pulls base weights from HuggingFace via AutoBridge so no pre-existing
# Megatron checkpoint is required. Uses the packed_parquet shards produced by
# `nemotron step run prep/sft_packing -c tiny -r slurm_sft_dataprep_tiny`.
#
# Note: dataset paths are explicit (Megatron-Bridge's vanilla schema). This
# step is generic — recipe-specific dir shortcuts live in recipes/, not here.

# Override the container's stale Megatron-Bridge with a branch that supports
# packed-parquet specs (matches what the nano3 recipe uses).
run:
  env:
    mounts:
      - ${auto_mount:git+https://github.com/NVIDIA/Megatron-LM.git@bbbedbb9f53343762e4dc70abc771b813a83d817,/opt/megatron-lm}
      - ${auto_mount:git+https://github.com/NVIDIA-NeMo/Megatron-Bridge.git@romeyn/parquet-sequence-pack,/opt/Megatron-Bridge}

hf_model_path: nvidia/NVIDIA-Nemotron-3-Nano-30B-A3B-BF16
trust_remote_code: true
load_hf_weights: true

recipe:
  _target_: megatron.bridge.recipes.nemotronh.nemotron_3_nano.nemotron_3_nano_finetune_config
  packed_sequence: true
  # LoRA on 2 nodes — full SFT of the 30B MoE OOMs on 16×H100 even with EP=8
  # and full activation recompute. PEFT keeps the optimizer state tiny.
  peft: lora
  seq_length: 4096
  tensor_model_parallel_size: 4
  pipeline_model_parallel_size: 1
  # EP / ETP are not recipe-level kwargs — set them on `model:` below where
  # apply_overrides handles the merge onto the built ConfigContainer.

# LoRA adapter spec applied via Megatron-Bridge's default_peft_config.
peft:
  type: lora
  dim: 16
  alpha: 32
  dropout: 0.0
  target_modules:
    - linear_qkv
    - linear_proj

dataset:
  seq_length: 4096
  packed_sequence_specs:
    packed_sequence_size: 4096
    packed_train_data_path: ${oc.env:SFT_PACKED_DIR,/mnt/lustre-shared/output/functional/prep/sft_packing/tiny/splits/train}
    # No validation shards from sample=1000 run; uncomment when valid/ exists.
    # packed_val_data_path: ${oc.env:SFT_PACKED_VAL_DIR,/mnt/lustre-shared/output/functional/prep/sft_packing/tiny/splits/valid}

train:
  train_iters: 10
  # 16 GPUs / TP=4 => DP=4; micro=1, so global must be a multiple of 4.
  global_batch_size: 8
  micro_batch_size: 1

model:
  seq_length: 4096
  tensor_model_parallel_size: 4
  pipeline_model_parallel_size: 1
  context_parallel_size: 1
  expert_model_parallel_size: 8
  expert_tensor_parallel_size: 1
  sequence_parallel: true
  # Required by Megatron-Bridge whenever CP > 1 is anywhere in the pipeline.
  calculate_per_token_loss: true
  # Activation recomputation to keep peak memory in check at seq_length=4096.
  recompute_granularity: full
  recompute_method: uniform
  recompute_num_layers: 1

scheduler:
  lr_warmup_iters: 2

logger:
  log_interval: 1
  wandb_project: ${oc.env:WANDB_PROJECT,null}
  wandb_entity: ${oc.env:WANDB_ENTITY,null}
  wandb_exp_name: ${oc.env:WANDB_NAME,sft-megatron-bridge}

checkpoint:
  save: ${oc.env:SFT_OUTPUT_DIR}/sft-tiny-2node
  save_interval: 5
  finetune: true
