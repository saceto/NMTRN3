# =============================================================================
# DAPO Ultra V3 Baseline - NeMo Gym Path
# =============================================================================
# Full-weight Ultra DAPO-Math recipe using NeMo Gym for rollout and reward handling.
# This file is self-contained and intentionally has no defaults inheritance.
# =============================================================================

cluster:
  gpus_per_node: 4
  num_nodes: 18
  segment_size: 16
checkpointing:
  enabled: true
  checkpoint_dir: results/dapo_ultra_starter_nemo_gym
  metric_name: train:reward
  higher_is_better: true
  keep_top_k: 1
  save_period: 10
  ft_keep_latest_k: 1
  ft_save_period: 10
  checkpoint_must_save_by: null
  model_save_format: null
  save_consolidated: false
grpo:
  num_prompts_per_step: 64
  num_generations_per_prompt: 16
  num_val_generations_per_prompt: 16
  max_rollout_turns: 1
  max_num_epochs: 1
  max_num_steps: 100
  normalize_rewards: true
  use_leave_one_out_baseline: false
  advantage_clip_low: -50
  advantage_clip_high: 50
  val_period: -1
  val_at_start: false
  val_at_end: false
  overlong_filtering: false
  max_val_samples: null
  val_batch_size: 32
  seed: 42
  use_dynamic_sampling: false
  dynamic_sampling_max_gen_batches: 16
  batch_multiplier: 1
  dynamic_sampling_oversample_ratio: 1.0
  reward_shaping:
    enabled: true
    overlong_buffer_length: 256
    overlong_buffer_penalty: 1
    max_response_length: 2048
    stop_properly_penalty_coef: null
  reward_scaling:
    enabled: true
    source_min: 0.0
    source_max: 1.0
    target_min: -1.0
    target_max: 1.0
  adv_estimator:
    name: grpo
    normalize_rewards: ${grpo.normalize_rewards}
    use_leave_one_out_baseline: ${grpo.use_leave_one_out_baseline}
    minus_baseline: true
  async_grpo:
    enabled: false
    max_trajectory_age_steps: 1
    in_flight_weight_updates: false
    recompute_kv_cache_after_weight_updates: false
  use_best_at_k: false
  best_at_k_k: 8
  best_at_k_m: 1000
  use_combined_training: false
  combined_training_weight_mode: auto
  combined_training_best_at_k_weight: 0.2
  combined_training_pass_at_1_weight: 1.0
  penalize_invalid_tool_call: false
  invalid_tool_call_advantage: -5.0
  penalize_malformed_thinking: false
  malformed_thinking_advantage: -5.0
  seq_logprob_error_threshold: 2
loss_fn:
  reference_policy_kl_penalty: 0.0
  reference_policy_kl_type: k3
  kl_input_clamp_value: null
  kl_output_clamp_value: null
  ratio_clip_min: 0.2
  ratio_clip_max: 0.28
  ratio_clip_c: 10.0
  use_on_policy_kl_approximation: true
  use_importance_sampling_correction: true
  truncated_importance_sampling_ratio: 5
  truncated_importance_sampling_ratio_min: null
  truncated_importance_sampling_type: tis
  sequence_level_importance_ratios: false
  token_level_loss: true
  force_on_policy_ratio: false
  use_kl_in_reward: false
policy:
  model_name: /shared/models/NVIDIA-Nemotron-3-Ultra-550B-A55B-BF16-compat
  tokenizer:
    name: ${policy.model_name}
    chat_template_kwargs: null
  hf_config_overrides: {}
  train_global_batch_size: 1024
  train_micro_batch_size: 1
  generation_batch_size: 64
  logprob_batch_size: 1
  max_total_sequence_length: 4096
  precision: bfloat16
  logprob_chunk_size: 1024
  offload_optimizer_for_logprob: false
  dtensor_cfg:
    enabled: false
  megatron_cfg:
    enabled: true
    empty_unused_memory_level: 1
    activation_checkpointing: true
    tensor_model_parallel_size: 8
    expert_tensor_parallel_size: 1
    expert_model_parallel_size: 64
    pipeline_model_parallel_size: 1
    num_layers_in_first_pipeline_stage: null
    num_layers_in_last_pipeline_stage: null
    context_parallel_size: 8
    pipeline_dtype: ${policy.precision}
    sequence_parallel: true
    freeze_moe_router: true
    moe_router_dtype: fp32
    moe_router_load_balancing_type: none
    moe_router_bias_update_rate: 0.001
    moe_router_enable_expert_bias: true
    moe_permute_fusion: true
    moe_enable_deepep: false
    moe_token_dispatcher_type: flex
    moe_flex_dispatcher_backend: hybridep
    moe_hybridep_num_sms: 32
    moe_aux_loss_coeff: 0.0
    moe_shared_expert_overlap: false
    use_gloo_process_groups: false
    apply_rope_fusion: true
    use_fused_weighted_squared_relu: true
    bias_activation_fusion: false
    defer_fp32_logits: true
    track_moe_metrics: false
    moe_per_layer_logging: false
    do_not_average_loss: true
    cp_normalize: true
    calculate_per_token_loss: true
    scale_loss_by_dp_cp_size: false
    mtp_loss_scaling_factor: 0.3
    mtp_use_repeated_layer: true
    mtp_num_layers: 5
    mtp_detach_heads: true
    optimizer:
      optimizer: adam
      lr: 1.0e-06
      min_lr: 1.0e-06
      weight_decay: 0.0
      bf16: true
      fp16: false
      params_dtype: float32
      adam_beta1: 0.9
      adam_beta2: 0.999
      adam_eps: 1e-8
      sgd_momentum: 0.9
      use_distributed_optimizer: true
      use_precision_aware_optimizer: true
      clip_grad: ${policy.max_grad_norm}
      optimizer_cpu_offload: false
      optimizer_offload_fraction: 0.0
    scheduler:
      start_weight_decay: ${policy.megatron_cfg.optimizer.weight_decay}
      end_weight_decay: ${policy.megatron_cfg.optimizer.weight_decay}
      weight_decay_incr_style: constant
      lr_decay_style: constant
      lr_decay_iters: null
      lr_warmup_iters: 0
      lr_warmup_init: 1.0e-07
    distributed_data_parallel_config:
      grad_reduce_in_fp32: false
      overlap_grad_reduce: false
      overlap_param_gather: true
      average_in_collective: false
      use_custom_fsdp: false
      data_parallel_sharding_strategy: optim_grads_params
    fp8_cfg:
      enabled: false
      fp8: e4m3
      fp8_recipe: mxfp8
      fp8_param: false
    first_last_layers_bf16: true
    num_layers_at_start_in_bf16: 1
    num_layers_at_end_in_bf16: 1
    checkpoint:
      async_save: true
      ckpt_assume_constant_structure: true
      fully_parallel_save_process_group: ep_dp
      fully_parallel_load_process_group: ep_dp
      fully_parallel_load_exchange_algo: broadcast
    env_vars: null
  dynamic_batching:
    enabled: false
    train_mb_tokens: ${mul:${policy.max_total_sequence_length}, ${policy.train_micro_batch_size}}
    logprob_mb_tokens: ${mul:${policy.max_total_sequence_length}, ${policy.logprob_batch_size}}
    sequence_length_round: 64
  sequence_packing:
    enabled: true
    train_mb_tokens: ${mul:${policy.max_total_sequence_length}, ${policy.train_micro_batch_size}}
    logprob_mb_tokens: ${mul:${policy.max_total_sequence_length}, ${policy.logprob_batch_size}}
    algorithm: modified_first_fit_decreasing
    sequence_length_round: 64
    fuse_loss: true
  make_sequence_length_divisible_by: ${policy.megatron_cfg.tensor_model_parallel_size}
  max_grad_norm: 1.0
  optimizer: null
  scheduler: null
  generation:
    port_range_low: 3000
    port_range_high: 4999
    backend: vllm
    max_new_tokens: 2048
    temperature: 1.0
    top_p: 1.0
    top_k: null
    stop_token_ids: null
    stop_strings: null
    mcore_generation_config:
      buffer_size_gb: 20
      buffer_guaranteed_fraction: 0.1
      num_cuda_graphs: 16
      block_size_tokens: 256
      use_cuda_graphs_for_non_decode_steps: true
      enable_chunked_prefill: true
      unified_memory_level: 0
      max_tokens: 4096
    vllm_cfg:
      async_engine: true
      precision: ${policy.precision}
      kv_cache_dtype: auto
      tensor_parallel_size: 8
      pipeline_parallel_size: 1
      expert_parallel_size: 1
      gpu_memory_utilization: 0.85
      max_model_len: 4096
      enforce_eager: false
      use_deep_gemm: false
      num_last_layers_in_bf16: 0
      num_first_layers_in_bf16: 0
      enable_vllm_metrics_logger: true
      vllm_metrics_logger_interval: 0.5
      skip_tokenizer_init: false
      fp8_cfg:
        is_mx: false
      expose_http_server: true
      http_server_serving_chat_kwargs:
        enable_auto_tools: true
        tool_parser: qwen3_coder
        reasoning_parser: ultra_v3
        reasoning_parser_plugin: /shared/models/NVIDIA-Nemotron-3-Ultra-550B-A55B-BF16-compat/ultra_v3_reasoning_parser.py
    vllm_kwargs:
      attention_backend: FLASH_ATTN
      mamba_ssm_cache_dtype: float32
      compilation_config:
        cudagraph_capture_sizes:
        - 1
        - 2
        - 4
        - 8
        - 16
        - 32
        - 64
        pass_config:
          fuse_allreduce_rms: false
      enable_chunked_prefill: true
      max_num_batched_tokens: 8192
      mamba_cache_mode: align
    colocated:
      enabled: false
      resources:
        gpus_per_node: 4
        num_nodes: 2
data:
  max_input_seq_length: null
  shuffle: false
  num_workers: 0
  train:
    data_path: examples/data/dapo17k_nemo_gym_train6400.jsonl
    dataset_name: NemoGymDataset
    env_name: nemo_gym
    prompt_file: null
    system_prompt_file: null
    processor: nemo_gym_data_processor
  validation:
    data_path: examples/data/dapo17k_nemo_gym_validation256.jsonl
    dataset_name: NemoGymDataset
    env_name: nemo_gym
    prompt_file: null
    system_prompt_file: null
    processor: nemo_gym_data_processor
  default:
    dataset_name: NemoGymDataset
    env_name: nemo_gym
    prompt_file: null
    system_prompt_file: null
    processor: nemo_gym_data_processor
env:
  should_use_nemo_gym: true
  should_log_nemo_gym_responses: true
  nemo_gym:
    nemo_gym_log_dir: logs/nemo_gym
    rollout_max_attempts_to_avoid_lp_nan: 1
    skip_venv_if_present: true
    is_trajectory_collection: false
    port_range_low: 5000
    port_range_high: 5999
    config_paths:
    - responses_api_models/vllm_model/configs/vllm_model_for_training.yaml
    - resources_servers/math_with_judge/configs/math_with_judge.yaml
    math_with_judge:
      resources_servers:
        math_with_judge:
          judge_model_server:
            name: policy_model
          should_use_judge: false
          domain: math
          verified: false
    policy_model:
      responses_api_models:
        vllm_model:
          num_workers: 4
          num_groups_nemo_rl: ${add:${grpo.async_grpo.max_trajectory_age_steps}, 1}
    policy_model_reasoning_off:
      responses_api_models:
        vllm_model:
          num_workers: 4
          num_groups_nemo_rl: ${add:${grpo.async_grpo.max_trajectory_age_steps}, 1}
logger:
  log_dir: logs/dapo_ultra_starter_nemo_gym
  num_val_samples_to_print: 0
  wandb_enabled: false
  tensorboard_enabled: false
  mlflow_enabled: false
  monitor_gpus: true
  swanlab_enabled: false
  wandb:
    project: dapo-ultra-nemo-gym
    name: dapo-ultra-starter-nemo-gym
  swanlab:
    project: dapo-ultra-starter
    name: dapo-ultra-starter
  tensorboard: {}
  mlflow:
    experiment_name: dapo-ultra-starter
    run_name: dapo-ultra-starter
  gpu_monitoring:
    collection_interval: 10
    flush_interval: 10
