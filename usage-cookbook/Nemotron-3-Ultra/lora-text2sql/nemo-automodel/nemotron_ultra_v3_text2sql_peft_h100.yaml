# =============================================================================
# Nemotron-3-Ultra (550B-A55B BF16) — LoRA / Text2SQL — H100 (SECONDARY / P1)
# =============================================================================
# Topology: multi-node H100 80 GB (32 GPUs total, e.g. 4 nodes x 8 GPUs)
# under Slurm. ep_size (32) MUST equal the world size (nnodes * nproc-per-node).
#
# The notebook substitutes the __UPPER_CASE__ tokens below from its config cell:
#   __PRETRAINED_MODEL_PATH__  -> MODEL_PATH (your NGC-downloaded Ultra checkpoint)
#   __TRAIN_JSONL__            -> DATASET_DIR/training.jsonl
#   __VAL_JSONL__              -> DATASET_DIR/validation.jsonl
#   __CHECKPOINT_DIR__         -> OUTPUT_DIR/checkpoints
#
# Launch (4-node Slurm allocation, 8 GPUs/node):
#   MASTER_ADDR=$(scontrol show hostnames "$SLURM_JOB_NODELIST" | head -n 1)
#   srun --ntasks-per-node=1 --nodes=4 bash -c '
#     torchrun --nnodes=4 --nproc-per-node=8 \
#       --rdzv-backend=c10d --rdzv-endpoint="$MASTER_ADDR":29500 \
#       --node-rank=$SLURM_NODEID \
#       examples/llm_finetune/finetune.py \
#       -c examples/llm_finetune/nemotron/nemotron_ultra_v3_text2sql_peft_h100.yaml'

recipe: TrainFinetuneRecipeForNextTokenPrediction

step_scheduler:
  num_epochs: 1
  max_steps: 100
  global_batch_size: 128
  local_batch_size: 4
  ckpt_every_steps: 20
  val_every_steps: 20

dist_env:
  backend: nccl
  timeout_minutes: 30

rng:
  _target_: nemo_automodel.components.training.rng.StatefulRNG
  seed: 1111
  ranked: true

model:
  _target_: nemo_automodel.NeMoAutoModelForCausalLM.from_pretrained
  pretrained_model_name_or_path: __PRETRAINED_MODEL_PATH__
  trust_remote_code: true
  # MTP head predicts the next 2 tokens. ``mtp_use_repeated_layer=true``
  # reuses ONE physical MTP layer across both depths (weight-tied iterations,
  # mirrors Megatron's --mtp-use-repeated-layer) so the parameter count
  # stays the same as a 1-depth MTP. Block-type pattern is auto-resolved
  # from Ultra's ``mtp_layers_block_type: ["attention", "moe"]`` field.
  num_nextn_predict_layers: 2
  mtp_use_repeated_layer: true
  mtp_loss_scaling_factor: 0.1
  output_hidden_states: true
  backend:
    _target_: nemo_automodel.components.models.common.BackendConfig
    attn: te
    linear: te
    rms_norm: te
    experts: gmm
    dispatcher: deepep
    fake_balanced_gate: false
    enable_fsdp_optimizations: false

checkpoint:
  enabled: true
  checkpoint_dir: __CHECKPOINT_DIR__
  model_save_format: safetensors
  save_consolidated: true

distributed:
  strategy: fsdp2
  dp_size: none
  tp_size: 1
  cp_size: 1
  pp_size: 1
  ep_size: 32
  activation_checkpointing: true
  defer_fsdp_grad_sync: true

  moe:
    reshard_after_forward: true
    wrap_outer_model: false

loss_fn:
  _target_: nemo_automodel.components.loss.linear_ce.FusedLinearCrossEntropy

peft:
  _target_: nemo_automodel.components._peft.lora.PeftConfig
  exclude_modules: ["*.out_proj"]  # mamba layers use custom kernels that take in the out_proj.weight directly, thus lora doesn't work here.
  dim: 32
  alpha: 32
  use_triton: True

# --- Data plumbing: Text2SQL (BIRD-SQL) ------------------------------------
# Only the dataset/dataloader blocks differ from the validated HellaSwag
# recipe. THD packing + the TE attention path are preserved; we swap ONLY the
# dataset _target_ to the Text2SQL JSONL loader from the dataset-prep step.
dataset:
  _target_: nemo_automodel.components.datasets.llm.text2sql.make_text2sql_dataset
  path_or_dataset: __TRAIN_JSONL__
  answer_only_loss_mask: true
  truncation: true
  padding: do_not_pad
  tokenizer:
    _target_: transformers.AutoTokenizer.from_pretrained
    pretrained_model_name_or_path: __PRETRAINED_MODEL_PATH__

packed_sequence:
  packed_sequence_size: 2048
  packing_strategy: thd

dataloader:
  _target_: torchdata.stateful_dataloader.StatefulDataLoader
  collate_fn: nemo_automodel.components.datasets.utils.packed_sequence_thd_collater
  shuffle: true

# Validation uses the same THD collater as training. Because
# _uses_thd_collater(cfg.dataloader) is True and the model uses TE attention,
# build_validation_dataloader forwards packed_sequence config — validation
# is THD-packed too, so the whole run stays on the (1, T) searchsorted path.
validation_dataset:
  _target_: nemo_automodel.components.datasets.llm.text2sql.make_text2sql_dataset
  path_or_dataset: __VAL_JSONL__
  answer_only_loss_mask: true
  truncation: true
  padding: do_not_pad
  tokenizer:
    _target_: transformers.AutoTokenizer.from_pretrained
    pretrained_model_name_or_path: __PRETRAINED_MODEL_PATH__

validation_dataloader:
  _target_: torchdata.stateful_dataloader.StatefulDataLoader
  collate_fn: nemo_automodel.components.datasets.utils.packed_sequence_thd_collater
  shuffle: false

optimizer:
  _target_: torch.optim.AdamW
  betas: [0.9, 0.95]
  eps: 1.0e-8
  lr: 1.0e-4
  weight_decay: 0.1

lr_scheduler:
  lr_decay_style: cosine
  lr_warmup_steps: 10
  min_lr: 1.0e-5
